name: BT7 Capacity Turnover Realism Gate

on:
  push:
    paths:
      - "src/validation/capacity_turnover_realism_gate.py"
      - "tests/test_bt7_capacity_turnover_realism_gate.py"
      - "scripts/generate_bt7_capacity_turnover_report.py"
      - "data/demo_bt7_capacity_turnover.json"
      - ".github/workflows/bt7.yml"
  pull_request:
    paths:
      - "src/validation/capacity_turnover_realism_gate.py"
      - "tests/test_bt7_capacity_turnover_realism_gate.py"
      - "scripts/generate_bt7_capacity_turnover_report.py"
      - "data/demo_bt7_capacity_turnover.json"
      - ".github/workflows/bt7.yml"
  workflow_dispatch:

jobs:
  bt7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run BT7 capacity turnover realism tests
        run: pytest tests/test_bt7_capacity_turnover_realism_gate.py -q

      - name: Generate BT7 demo report
        run: python scripts/generate_bt7_capacity_turnover_report.py --demo
