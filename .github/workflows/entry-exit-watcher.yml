name: Entry Exit Watcher

on:
  schedule:
    # Approx. 1h after US open
    - cron: "0 15 * * 1-5"
    # Mid-session check
    - cron: "30 17 * * 1-5"
    # Postmarket lifecycle check
    - cron: "0 21 * * 1-5"

  workflow_dispatch:
    inputs:
      signals_file:
        description: "Signal file to evaluate"
        required: false
        default: "reports/signals/latest-signals.json"

permissions:
  contents: write
  actions: read

concurrency:
  group: entry-exit-watcher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watcher:
    name: Run Entry Exit Watcher
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve watcher inputs
        shell: bash
        run: |
          SIGNALS_FILE="reports/signals/latest-signals.json"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SIGNALS_FILE="${{ github.event.inputs.signals_file }}"
          fi
          if [[ -z "$SIGNALS_FILE" ]]; then
            SIGNALS_FILE="reports/signals/latest-signals.json"
          fi

          WATCHER_CYCLE_ID="entry-exit-watcher-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          echo "SIGNALS_FILE=$SIGNALS_FILE" >> "$GITHUB_ENV"
          echo "WATCHER_CYCLE_ID=$WATCHER_CYCLE_ID" >> "$GITHUB_ENV"

          echo "Using signals file: $SIGNALS_FILE"
          echo "WATCHER_CYCLE_ID=$WATCHER_CYCLE_ID"

      - name: Validate watcher inputs
        shell: bash
        run: |
          echo "Validating watcher inputs for $WATCHER_CYCLE_ID"
          mkdir -p reports/alerts

          if [[ -z "${POLYGON_API_KEY:-}" ]]; then
            echo "POLYGON_API_KEY secret is missing. Runtime watcher will be skipped instead of failing PR workflow."
            {
              echo "Entry/Exit Watcher SKIPPED"
              echo "Cycle: ${WATCHER_CYCLE_ID}"
              echo "Reason: POLYGON_API_KEY secret is missing."
            } > reports/alerts/watcher-skip-message.txt
            echo "WATCHER_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ ! -f "$SIGNALS_FILE" ]]; then
            echo "Signals file does not exist: $SIGNALS_FILE. Runtime watcher will be skipped instead of failing PR workflow."
            {
              echo "Entry/Exit Watcher SKIPPED"
              echo "Cycle: ${WATCHER_CYCLE_ID}"
              echo "Reason: signals file not found at ${SIGNALS_FILE}"
            } > reports/alerts/watcher-skip-message.txt
            echo "WATCHER_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          python -c "import json, os; from pathlib import Path; path = Path(os.environ['SIGNALS_FILE']); data = json.loads(path.read_text(encoding='utf-8')); signals = data if isinstance(data, list) else data.get('signals', []) if isinstance(data, dict) else None; assert isinstance(signals, list), f'Signals payload must contain a list: {path}'; invalid = sum(1 for item in signals if not isinstance(item, dict)); assert invalid == 0, f'Signals payload contains {invalid} non-object records: {path}'; print(f'Signals file validated: {path} ({len(signals)} signals)')"
          echo "WATCHER_SKIP=false" >> "$GITHUB_ENV"

      - name: Run watcher
        if: env.WATCHER_SKIP != 'true'
        shell: bash
        run: |
          mkdir -p reports/alerts
          mkdir -p reports/signals
          mkdir -p data
          echo "Starting watcher cycle: $WATCHER_CYCLE_ID"
          python scripts/run_entry_exit_watcher.py --signals-file "$SIGNALS_FILE"

      - name: Commit watcher outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/alerts/ 2>/dev/null || true
          git add reports/signals/ 2>/dev/null || true
          git add data/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No watcher changes to commit."
            exit 0
          fi

          git commit -m "Update entry exit watcher events ${WATCHER_CYCLE_ID}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Build watcher alert summary
        if: success() && env.WATCHER_SKIP != 'true'
        shell: bash
        run: |
          if [[ -f reports/alerts/latest-alerts.json ]]; then
            ALERT_COUNT=$(python -c "import json; from pathlib import Path; path = Path('reports/alerts/latest-alerts.json'); data = json.loads(path.read_text()) if path.exists() else []; print(len(data) if isinstance(data, list) else 0)")
          else
            ALERT_COUNT=0
          fi

          if [[ "$ALERT_COUNT" == "0" ]]; then
            echo "No alerts to send."
            echo "SEND_ALERTS=false" >> "$GITHUB_ENV"
          else
            echo "SEND_ALERTS=true" >> "$GITHUB_ENV"
            python -c "import json; from pathlib import Path; data=json.loads(Path('reports/alerts/latest-alerts.json').read_text()); lines=['Entry/Exit Watcher Alerts','']; [lines.append(f\"{item.get('symbol')}: {item.get('alert_type')} @ {item.get('price')} ({item.get('previous_status')} -> {item.get('new_status')}) | signal_id={item.get('signal_id', 'unknown')}\") for item in data[:10]]; Path('reports/alerts/watcher-alert-summary.txt').write_text('\\n'.join(lines) + '\\n', encoding='utf-8')"
          fi

      - name: Send watcher alert notification
        if: success() && env.SEND_ALERTS == 'true'
        shell: bash
        run: |
          python scripts/send_notification.py \
            --message-file reports/alerts/watcher-alert-summary.txt \
            --telegram \
            --webhook \
            --cycle-id "$WATCHER_CYCLE_ID" || true

      - name: Build watcher failure message
        if: failure()
        shell: bash
        run: |
          mkdir -p reports
          {
            echo "Entry/Exit Watcher FAILED"
            echo "Cycle: ${WATCHER_CYCLE_ID:-unknown}"
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Signals file: ${SIGNALS_FILE:-unknown}"
          } > reports/watcher-failure-message.txt

      - name: Send watcher failure notification
        if: failure()
        shell: bash
        run: |
          python scripts/send_notification.py \
            --message-file reports/watcher-failure-message.txt \
            --telegram \
            --webhook \
            --cycle-id "${WATCHER_CYCLE_ID:-unknown}" || true

      - name: Upload alert artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entry-exit-alerts-${{ github.run_id }}
          path: |
            reports/alerts/
            reports/watcher-failure-message.txt
          if-no-files-found: ignore
          retention-days: 90
