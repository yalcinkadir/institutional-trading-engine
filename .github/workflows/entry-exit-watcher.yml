name: Entry Exit Watcher

on:
  schedule:
    - cron: "0 15 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch:
    inputs:
      signals_file:
        description: "Signal file to evaluate"
        required: false
        default: "reports/signals/latest-signals.json"

permissions:
  contents: write
  actions: read

concurrency:
  group: entry-exit-watcher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watcher:
    name: Run Entry Exit Watcher
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve watcher inputs
        shell: bash
        run: |
          SIGNALS_FILE="reports/signals/latest-signals.json"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIGNALS_FILE="${{ github.event.inputs.signals_file }}"
          fi
          if [ -z "$SIGNALS_FILE" ]; then SIGNALS_FILE="reports/signals/latest-signals.json"; fi
          echo "SIGNALS_FILE=$SIGNALS_FILE" >> "$GITHUB_ENV"
          echo "WATCHER_CYCLE_ID=entry-exit-watcher-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Validate watcher inputs
        shell: bash
        run: |
          mkdir -p reports/alerts
          if [ -z "${POLYGON_API_KEY:-}" ]; then
            echo "POLYGON_API_KEY secret is missing. Skipping watcher runtime."
            echo "Entry/Exit Watcher SKIPPED" > reports/alerts/watcher-skip-message.txt
            echo "Reason: POLYGON_API_KEY secret is missing." >> reports/alerts/watcher-skip-message.txt
            echo "WATCHER_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ ! -f "$SIGNALS_FILE" ]; then
            echo "Signals file not found: $SIGNALS_FILE. Skipping watcher runtime."
            echo "Entry/Exit Watcher SKIPPED" > reports/alerts/watcher-skip-message.txt
            echo "Reason: signals file not found at $SIGNALS_FILE" >> reports/alerts/watcher-skip-message.txt
            echo "WATCHER_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          python -c "import json, os; from pathlib import Path; p=Path(os.environ['SIGNALS_FILE']); d=json.loads(p.read_text(encoding='utf-8')); s=d if isinstance(d,list) else d.get('signals',[]) if isinstance(d,dict) else None; assert isinstance(s,list); assert all(isinstance(x,dict) for x in s); print('Signals file validated:', p, len(s))"
          echo "WATCHER_SKIP=false" >> "$GITHUB_ENV"

      - name: Run watcher
        if: env.WATCHER_SKIP != 'true'
        shell: bash
        run: |
          mkdir -p reports/alerts reports/signals data
          python scripts/run_entry_exit_watcher.py --signals-file "$SIGNALS_FILE"

      - name: Commit watcher outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/alerts/ reports/signals/ data/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No watcher changes to commit."
            exit 0
          fi
          git commit -m "Update entry exit watcher events ${WATCHER_CYCLE_ID}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Build watcher alert summary
        if: success() && env.WATCHER_SKIP != 'true'
        shell: bash
        run: |
          if [ -f reports/alerts/latest-alerts.json ]; then
            python -c "import json; from pathlib import Path; p=Path('reports/alerts/latest-alerts.json'); data=json.loads(p.read_text()); lines=['Entry/Exit Watcher Alerts','']; [lines.append(str(item)) for item in data[:10]] if isinstance(data,list) else None; Path('reports/alerts/watcher-alert-summary.txt').write_text('\n'.join(lines)+'\n', encoding='utf-8')"
          else
            echo "No alerts to send." > reports/alerts/watcher-alert-summary.txt
          fi

      - name: Send watcher alert notification
        if: success() && env.WATCHER_SKIP != 'true'
        shell: bash
        run: |
          if [ -f reports/alerts/watcher-alert-summary.txt ]; then
            python scripts/send_notification.py --message-file reports/alerts/watcher-alert-summary.txt --telegram --webhook --cycle-id "$WATCHER_CYCLE_ID" || true
          fi

      - name: Build watcher failure message
        if: failure()
        shell: bash
        run: |
          mkdir -p reports
          echo "Entry/Exit Watcher FAILED" > reports/watcher-failure-message.txt
          echo "Cycle: ${WATCHER_CYCLE_ID:-unknown}" >> reports/watcher-failure-message.txt
          echo "Signals file: ${SIGNALS_FILE:-unknown}" >> reports/watcher-failure-message.txt

      - name: Send watcher failure notification
        if: failure()
        shell: bash
        run: |
          if [ -f reports/watcher-failure-message.txt ]; then
            python scripts/send_notification.py --message-file reports/watcher-failure-message.txt --telegram --webhook --cycle-id "${WATCHER_CYCLE_ID:-unknown}" || true
          fi

      - name: Upload alert artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entry-exit-alerts-${{ github.run_id }}
          path: |
            reports/alerts/
            reports/watcher-failure-message.txt
          if-no-files-found: ignore
          retention-days: 90
