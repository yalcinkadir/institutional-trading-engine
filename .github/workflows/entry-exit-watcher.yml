name: Entry Exit Watcher

on:
  schedule:
    # Approx. 1h after US open
    - cron: "0 15 * * 1-5"
    # Mid-session check
    - cron: "30 17 * * 1-5"
    # Postmarket lifecycle check
    - cron: "0 21 * * 1-5"

  workflow_dispatch:
    inputs:
      signals_file:
        description: "Signal file to evaluate"
        required: false
        default: "reports/signals/latest-signals.json"

permissions:
  contents: write
  actions: read

concurrency:
  group: entry-exit-watcher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watcher:
    name: Run Entry Exit Watcher
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve watcher inputs
        shell: bash
        run: |
          SIGNALS_FILE="reports/signals/latest-signals.json"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SIGNALS_FILE="${{ github.event.inputs.signals_file }}"
          fi
          if [[ -z "$SIGNALS_FILE" ]]; then
            SIGNALS_FILE="reports/signals/latest-signals.json"
          fi

          WATCHER_CYCLE_ID="entry-exit-watcher-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          echo "SIGNALS_FILE=$SIGNALS_FILE" >> "$GITHUB_ENV"
          echo "WATCHER_CYCLE_ID=$WATCHER_CYCLE_ID" >> "$GITHUB_ENV"

          echo "Using signals file: $SIGNALS_FILE"
          echo "WATCHER_CYCLE_ID=$WATCHER_CYCLE_ID"

      - name: Validate watcher inputs
        shell: bash
        run: |
          echo "Validating watcher inputs for $WATCHER_CYCLE_ID"

          if [[ -z "${POLYGON_API_KEY:-}" ]]; then
            echo "::error title=Missing POLYGON_API_KEY::POLYGON_API_KEY secret is required for watcher market data retrieval."
            exit 1
          fi

          if [[ ! -f "$SIGNALS_FILE" ]]; then
            echo "::error title=Missing signals file::Configured signals file does not exist: $SIGNALS_FILE"
            exit 1
          fi

          python - <<'PY'
import json
import os
from pathlib import Path

path = Path(os.environ["SIGNALS_FILE"])
data = json.loads(path.read_text(encoding="utf-8"))
if isinstance(data, list):
    signals = data
elif isinstance(data, dict):
    signals = data.get("signals", [])
else:
    raise SystemExit(f"Signals file must contain a JSON list or object payload: {path}")
if not isinstance(signals, list):
    raise SystemExit(f"Signals payload must contain a list: {path}")
invalid = sum(1 for item in signals if not isinstance(item, dict))
if invalid:
    raise SystemExit(f"Signals payload contains {invalid} non-object records: {path}")
print(f"Signals file validated: {path} ({len(signals)} signals)")
PY

      - name: Run watcher
        shell: bash
        run: |
          mkdir -p reports/alerts
          mkdir -p reports/signals
          mkdir -p data
          echo "Starting watcher cycle: $WATCHER_CYCLE_ID"
          python scripts/run_entry_exit_watcher.py --signals-file "$SIGNALS_FILE"

      - name: Commit watcher outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/alerts/ 2>/dev/null || true
          git add reports/signals/ 2>/dev/null || true
          git add data/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No watcher changes to commit."
            exit 0
          fi

          git commit -m "Update entry exit watcher events ${WATCHER_CYCLE_ID}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Build watcher alert summary
        if: success()
        shell: bash
        run: |
          if [[ -f reports/alerts/latest-alerts.json ]]; then
            ALERT_COUNT=$(python - <<'PY'
import json
from pathlib import Path
path = Path('reports/alerts/latest-alerts.json')
try:
    data = json.loads(path.read_text())
    print(len(data) if isinstance(data, list) else 0)
except Exception:
    print(0)
PY
)
          else
            ALERT_COUNT=0
          fi

          if [[ "$ALERT_COUNT" == "0" ]]; then
            echo "No alerts to send."
            echo "SEND_ALERTS=false" >> "$GITHUB_ENV"
          else
            echo "SEND_ALERTS=true" >> "$GITHUB_ENV"
            python - <<'PY' > reports/alerts/watcher-alert-summary.txt
import json
from pathlib import Path
path = Path('reports/alerts/latest-alerts.json')
data = json.loads(path.read_text())
lines = ["Entry/Exit Watcher Alerts", ""]
for item in data[:10]:
    signal_id = item.get('signal_id', 'unknown')
    lines.append(
        f"{item.get('symbol')}: {item.get('alert_type')} @ {item.get('price')} "
        f"({item.get('previous_status')} -> {item.get('new_status')}) | signal_id={signal_id}"
    )
print("\n".join(lines))
PY
          fi

      - name: Send watcher alert notification
        if: success() && env.SEND_ALERTS == 'true'
        shell: bash
        run: |
          python scripts/send_notification.py \
            --message-file reports/alerts/watcher-alert-summary.txt \
            --telegram \
            --webhook \
            --cycle-id "$WATCHER_CYCLE_ID"

      - name: Build watcher failure message
        if: failure()
        shell: bash
        run: |
          mkdir -p reports
          cat > reports/watcher-failure-message.txt <<EOF
Entry/Exit Watcher FAILED
Cycle: ${WATCHER_CYCLE_ID:-unknown}
Repository: ${GITHUB_REPOSITORY}
Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
Signals file: ${SIGNALS_FILE:-unknown}
EOF

      - name: Send watcher failure notification
        if: failure()
        shell: bash
        run: |
          python scripts/send_notification.py \
            --message-file reports/watcher-failure-message.txt \
            --telegram \
            --webhook \
            --cycle-id "${WATCHER_CYCLE_ID:-unknown}"

      - name: Upload alert artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entry-exit-alerts-${{ github.run_id }}
          path: |
            reports/alerts/
            reports/watcher-failure-message.txt
          if-no-files-found: ignore
          retention-days: 90
