name: PR Edge Smoke

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - edge-evidence-modules-vix-universe-gates
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m py_compile scripts/build_sp500_plus_universe.py scripts/run_edge_evidence_backtest.py scripts/validate_universe_coverage.py
      - run: python -m pytest tests/test_survivorship_universe.py tests/test_liquidity_filter.py tests/test_forward_outcome_tracker.py tests/test_vix_adapter.py tests/test_edge_evidence_backtest.py -q
