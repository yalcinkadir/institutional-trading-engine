name: Daily Backup

on:
  schedule:
    # Daily backup at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: Create Runtime Backup
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create required runtime folders
        run: |
          mkdir -p data
          mkdir -p reports
          mkdir -p .cache/polygon

      - name: Generate backup archive
        run: |
          python scripts/create_backup.py --output-dir backups
          ls -lah backups

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: institutional-runtime-backup
          path: backups/*.zip
          retention-days: 30
