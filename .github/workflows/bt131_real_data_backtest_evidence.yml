name: BT131 Real Data Backtest Evidence

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols to ingest / validate"
        required: false
        default: "MSFT,NVDA,META,AAPL,MU,QQQ,GLD,SLV"
        type: string
      start_date:
        description: "Historical start date YYYY-MM-DD"
        required: false
        default: "2024-01-01"
        type: string
      end_date:
        description: "Historical end date YYYY-MM-DD. Defaults to current UTC date when blank."
        required: false
        type: string
      run_id:
        description: "Backtest run id"
        required: false
        default: "bt131-real-data-manual"
        type: string
      strategy_version:
        description: "Strategy version label"
        required: false
        default: "historical-entry-exit-v1"
        type: string
      plans_file:
        description: "Historical trade plans file"
        required: false
        default: "data/trade_plans/historical_trade_plans.json"
        type: string
      source_observations:
        description: "Optional validated Paper Observation records to export into historical trade plans"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  real-data-backtest-evidence:
    name: Build real-data backtest evidence or BLOCKED artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      VOLATILITY_PROXY_SYMBOL: ${{ vars.VOLATILITY_PROXY_SYMBOL || 'VIXY' }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare evidence directories
        run: |
          mkdir -p reports/backtests
          mkdir -p data/historical/metadata
          mkdir -p data/trade_plans

      - name: Resolve runtime inputs
        id: runtime
        env:
          INPUT_SYMBOLS: ${{ inputs.symbols }}
          INPUT_START_DATE: ${{ inputs.start_date }}
          INPUT_END_DATE: ${{ inputs.end_date }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          INPUT_STRATEGY_VERSION: ${{ inputs.strategy_version }}
          INPUT_PLANS_FILE: ${{ inputs.plans_file }}
          INPUT_SOURCE_OBSERVATIONS: ${{ inputs.source_observations }}
        run: |
          end_date="${INPUT_END_DATE:-$(date -u +%F)}"
          runtime_universe="data/historical/metadata/bt131_runtime_universe.csv"
          echo "symbols=${INPUT_SYMBOLS}" >> "$GITHUB_OUTPUT"
          echo "start_date=${INPUT_START_DATE}" >> "$GITHUB_OUTPUT"
          echo "end_date=${end_date}" >> "$GITHUB_OUTPUT"
          echo "run_id=${INPUT_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "strategy_version=${INPUT_STRATEGY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "plans_file=${INPUT_PLANS_FILE}" >> "$GITHUB_OUTPUT"
          echo "source_observations=${INPUT_SOURCE_OBSERVATIONS}" >> "$GITHUB_OUTPUT"
          echo "runtime_universe=${runtime_universe}" >> "$GITHUB_OUTPUT"

      - name: Optionally export historical trade plans from validated observations
        if: ${{ inputs.source_observations != '' }}
        run: |
          set +e
          python scripts/export_historical_trade_plans.py \
            --source "${{ steps.runtime.outputs.source_observations }}" \
            --output "${{ steps.runtime.outputs.plans_file }}" \
            --manifest data/trade_plans/historical_trade_plans_manifest.json
          echo "trade_plan_export_exit_code=$?" >> reports/backtests/bt131-runtime-status.env

      - name: Ingest historical Polygon bars when API key is available
        run: |
          if [ -z "${POLYGON_API_KEY:-}" ]; then
            echo "historical_ingestion_status=BLOCKED_MISSING_POLYGON_API_KEY" >> reports/backtests/bt131-runtime-status.env
            echo "POLYGON_API_KEY is not available; BT9 will fail closed if bars are missing."
            exit 0
          fi

          set +e
          python scripts/ingest_historical_polygon.py \
            --symbols "${{ steps.runtime.outputs.symbols }}" \
            --start-date "${{ steps.runtime.outputs.start_date }}" \
            --end-date "${{ steps.runtime.outputs.end_date }}" \
            --coverage-manifest-path data/historical/metadata/coverage_manifest.json \
            --metadata-path data/historical/metadata/ingestion_status.json \
            --output-root data/historical \
            --json > reports/backtests/bt131-historical-ingestion.json
          status=$?
          echo "historical_ingestion_exit_code=${status}" >> reports/backtests/bt131-runtime-status.env
          exit 0

      - name: Build BT131 runtime universe from ingested coverage
        run: |
          set +e
          python scripts/build_bt131_runtime_universe.py \
            --coverage-manifest data/historical/metadata/coverage_manifest.json \
            --output "${{ steps.runtime.outputs.runtime_universe }}" \
            --summary-output reports/backtests/bt131-runtime-universe.json
          status=$?
          echo "runtime_universe_exit_code=${status}" >> reports/backtests/bt131-runtime-status.env
          exit 0

      - name: Generate historical trade plans from ingested bars when needed
        if: ${{ inputs.source_observations == '' }}
        run: |
          if [ -f "${{ steps.runtime.outputs.plans_file }}" ]; then
            echo "historical_trade_plan_generation_status=SKIPPED_EXISTING_PLANS_FILE" >> reports/backtests/bt131-runtime-status.env
            exit 0
          fi

          set +e
          python scripts/generate_historical_trade_plans.py \
            --bars-root data/historical/bars/1day \
            --output "${{ steps.runtime.outputs.plans_file }}" \
            > reports/backtests/bt131-generated-trade-plans.json
          status=$?
          echo "historical_trade_plan_generation_exit_code=${status}" >> reports/backtests/bt131-runtime-status.env
          exit 0

      - name: Run BT9 input-pack gate
        run: |
          set +e
          python scripts/validate_bt9_real_historical_input_pack.py \
            --universe "${{ steps.runtime.outputs.runtime_universe }}" \
            --bars-root data/historical/bars/1day \
            --trade-plans "${{ steps.runtime.outputs.plans_file }}" \
            --report-output reports/backtests/bt9-real-historical-input-pack-gate.json
          status=$?
          echo "bt9_exit_code=${status}" >> reports/backtests/bt131-runtime-status.env
          exit 0

      - name: Run real-data historical entry/exit backtest
        run: |
          set +e
          python scripts/run_historical_entry_exit_backtest.py \
            --real-data \
            --data-source real_data \
            --run-id "${{ steps.runtime.outputs.run_id }}" \
            --strategy-version "${{ steps.runtime.outputs.strategy_version }}" \
            --plans-file "${{ steps.runtime.outputs.plans_file }}" \
            --bars-root data/historical/bars/1day \
            --universe "${{ steps.runtime.outputs.runtime_universe }}" \
            --coverage-manifest data/historical/metadata/coverage_manifest.json \
            --json-output reports/backtests/real-data-backtest-evidence.json \
            --markdown-output reports/backtests/real-data-backtest-evidence.md
          status=$?
          echo "backtest_exit_code=${status}" >> reports/backtests/bt131-runtime-status.env
          exit 0

      - name: Validate accepted real-data evidence when backtest passed
        run: |
          backtest_status=$(grep '^backtest_exit_code=' reports/backtests/bt131-runtime-status.env | tail -1 | cut -d= -f2 || echo "1")
          if [ "$backtest_status" != "0" ]; then
            echo "Backtest did not pass; expecting explicit BLOCKED evidence artifact."
            test -f reports/backtests/real-data-backtest-evidence.json
            exit 0
          fi

          python scripts/validate_real_data_backtest_evidence_gate.py \
            --artifact reports/backtests/real-data-backtest-evidence.json \
            --report-output reports/backtests/real-data-backtest-evidence-gate.json

      - name: Verify evidence artifact is reviewable
        run: |
          test -f reports/backtests/real-data-backtest-evidence.json
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("reports/backtests/real-data-backtest-evidence.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          required = [
              "run_id",
              "data_source",
              "is_demo",
              "input_pack_gate_status",
              "input_completeness_status",
              "run_health_status",
              "sample_quality_status",
              "min_trade_count",
              "live_trading_authorized",
              "broker_execution_mode",
          ]
          missing = [field for field in required if field not in payload]
          if missing:
              raise SystemExit(f"missing required backtest evidence fields: {missing}")
          if payload.get("data_source") != "real_data":
              raise SystemExit("BT131 evidence must be data_source=real_data")
          if payload.get("is_demo") is not False:
              raise SystemExit("BT131 evidence must not be demo")
          if payload.get("sample_quality_status") == "INSUFFICIENT_SAMPLE":
              raise SystemExit("BT131 evidence is INSUFFICIENT_SAMPLE; not review-ready")
          if payload.get("live_trading_authorized") is not False:
              raise SystemExit("BT131 must not authorize live trading")
          if payload.get("broker_execution_mode") != "paper_only":
              raise SystemExit("BT131 must remain paper_only")

          print("BT131 evidence artifact status:", payload.get("run_health_status"))
          print("BT131 input gate:", payload.get("input_pack_gate_status"))
          print("BT131 sample quality:", payload.get("sample_quality_status"))
          PY

      - name: Generate BT132 strategy improvement reports
        if: success()
        run: |
          python scripts/analyze_bt132_strategy_improvement.py \
            --evidence reports/backtests/real-data-backtest-evidence.json \
            --output-json reports/backtests/bt132-strategy-improvement-report.json \
            --output-md reports/backtests/bt132-strategy-improvement-report.md

      - name: Generate BT133 entry confirmation variant reports
        if: success()
        run: |
          python scripts/analyze_bt133_entry_confirmation_variants.py \
            --evidence reports/backtests/real-data-backtest-evidence.json \
            --output-json reports/backtests/bt133-entry-confirmation-variant-report.json \
            --output-md reports/backtests/bt133-entry-confirmation-variant-report.md

      - name: Generate BT134 stop-loss variant reports
        if: success()
        run: |
          python scripts/analyze_bt134_stop_loss_variants.py \
            --evidence reports/backtests/real-data-backtest-evidence.json \
            --output-json reports/backtests/bt134-stop-loss-variant-report.json \
            --output-md reports/backtests/bt134-stop-loss-variant-report.md

      - name: Generate BT139 sample expansion reports
        if: success()
        run: |
          python scripts/analyze_bt139_bt131_sample_expansion.py \
            --evidence reports/backtests/real-data-backtest-evidence.json \
            --output-json reports/backtests/bt139-bt131-sample-expansion-report.json \
            --output-md reports/backtests/bt139-bt131-sample-expansion-report.md

      - name: Generate BT176 guarded entry confirmation experiment reports
        if: success()
        run: |
          python scripts/analyze_bt176_guarded_entry_confirmation_experiment.py \
            --evidence reports/backtests/real-data-backtest-evidence.json \
            --variant-report reports/backtests/bt133-entry-confirmation-variant-report.json \
            --candidate-variant-id next_bar_close_confirmation_1bar \
            --output-json reports/backtests/bt133-guarded-entry-confirmation-experiment.json \
            --output-md reports/backtests/bt133-guarded-entry-confirmation-experiment.md

      - name: Persist validated backtest reports to repository
        if: success()
        env:
          RUN_ID: ${{ steps.runtime.outputs.run_id }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        run: |
          backtest_status=$(grep '^backtest_exit_code=' reports/backtests/bt131-runtime-status.env | tail -1 | cut -d= -f2 || echo "1")
          if [ "$backtest_status" != "0" ]; then
            echo "Skipping repo persistence because backtest did not pass."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase

          report_dir="reports/backtests/real_data/runs/${GITHUB_RUN_ID_VALUE}"
          latest_dir="reports/backtests/real_data/latest"
          mkdir -p "$report_dir" "$latest_dir"

          cp reports/backtests/real-data-backtest-evidence.json "$report_dir/real-data-backtest-evidence.json"
          cp reports/backtests/real-data-backtest-evidence.md "$report_dir/real-data-backtest-evidence.md"
          cp reports/backtests/bt9-real-historical-input-pack-gate.json "$report_dir/bt9-real-historical-input-pack-gate.json"
          cp reports/backtests/real-data-backtest-evidence-gate.json "$report_dir/real-data-backtest-evidence-gate.json"
          cp reports/backtests/bt131-runtime-universe.json "$report_dir/bt131-runtime-universe.json"
          cp reports/backtests/bt131-generated-trade-plans.json "$report_dir/bt131-generated-trade-plans.json" || true
          cp reports/backtests/bt132-strategy-improvement-report.json "$report_dir/bt132-strategy-improvement-report.json"
          cp reports/backtests/bt132-strategy-improvement-report.md "$report_dir/bt132-strategy-improvement-report.md"
          cp reports/backtests/bt133-entry-confirmation-variant-report.json "$report_dir/bt133-entry-confirmation-variant-report.json"
          cp reports/backtests/bt133-entry-confirmation-variant-report.md "$report_dir/bt133-entry-confirmation-variant-report.md"
          cp reports/backtests/bt134-stop-loss-variant-report.json "$report_dir/bt134-stop-loss-variant-report.json"
          cp reports/backtests/bt134-stop-loss-variant-report.md "$report_dir/bt134-stop-loss-variant-report.md"
          cp reports/backtests/bt139-bt131-sample-expansion-report.json "$report_dir/bt139-bt131-sample-expansion-report.json"
          cp reports/backtests/bt139-bt131-sample-expansion-report.md "$report_dir/bt139-bt131-sample-expansion-report.md"
          cp reports/backtests/bt133-guarded-entry-confirmation-experiment.json "$report_dir/bt133-guarded-entry-confirmation-experiment.json"
          cp reports/backtests/bt133-guarded-entry-confirmation-experiment.md "$report_dir/bt133-guarded-entry-confirmation-experiment.md"
          cp data/historical/metadata/coverage_manifest.json "$report_dir/coverage_manifest.json"
          cp data/historical/metadata/ingestion_status.json "$report_dir/ingestion_status.json"
          cp data/historical/metadata/bt131_runtime_universe.csv "$report_dir/bt131_runtime_universe.csv"
          cp "${{ steps.runtime.outputs.plans_file }}" "$report_dir/historical_trade_plans.json"

          rm -rf "$latest_dir"
          mkdir -p "$latest_dir"
          cp "$report_dir"/* "$latest_dir"/

          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          import os

          latest = Path("reports/backtests/real_data/latest")
          evidence = json.loads((latest / "real-data-backtest-evidence.json").read_text(encoding="utf-8"))
          improvement = json.loads((latest / "bt132-strategy-improvement-report.json").read_text(encoding="utf-8"))
          entry_variants = json.loads((latest / "bt133-entry-confirmation-variant-report.json").read_text(encoding="utf-8"))
          stop_variants = json.loads((latest / "bt134-stop-loss-variant-report.json").read_text(encoding="utf-8"))
          sample_expansion = json.loads((latest / "bt139-bt131-sample-expansion-report.json").read_text(encoding="utf-8"))
          guarded_entry = json.loads((latest / "bt133-guarded-entry-confirmation-experiment.json").read_text(encoding="utf-8"))
          index = {
              "updated_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "github_run_id": os.environ["GITHUB_RUN_ID_VALUE"],
              "run_id": evidence.get("run_id"),
              "data_source": evidence.get("data_source"),
              "is_demo": evidence.get("is_demo"),
              "input_pack_gate_status": evidence.get("input_pack_gate_status"),
              "input_completeness_status": evidence.get("input_completeness_status"),
              "run_health_status": evidence.get("run_health_status"),
              "sample_quality_status": evidence.get("sample_quality_status"),
              "min_trade_count": evidence.get("min_trade_count"),
              "broker_execution_mode": evidence.get("broker_execution_mode"),
              "metrics": evidence.get("metrics", {}),
              "bt132_review_status": improvement.get("review_status"),
              "bt132_recommendation_count": len(improvement.get("recommendations", [])),
              "bt133_final_recommendation": entry_variants.get("final_recommendation"),
              "bt133_variant_count": len(entry_variants.get("variant_results", [])),
              "bt134_final_recommendation": stop_variants.get("final_recommendation"),
              "bt134_variant_count": len(stop_variants.get("variant_results", [])),
              "bt134_production_rule_change_allowed": stop_variants.get("production_rule_change_allowed"),
              "bt139_evidence_quality": sample_expansion.get("evidence_quality"),
              "bt139_promotion_allowed": sample_expansion.get("promotion_allowed"),
              "bt139_trade_count": sample_expansion.get("trade_count"),
              "bt139_symbol_count": sample_expansion.get("symbol_count"),
              "bt139_signal_day_count": sample_expansion.get("signal_day_count"),
              "bt139_production_rule_change_allowed": sample_expansion.get("production_rule_change_allowed"),
              "bt176_guard_status": guarded_entry.get("guard_status"),
              "bt176_candidate_variant_id": guarded_entry.get("candidate_variant_id"),
              "bt176_experiment_scope": guarded_entry.get("experiment_scope"),
              "bt176_production_rule_change_allowed": guarded_entry.get("production_rule_change_allowed"),
          }
          Path("reports/backtests/real_data/index.json").write_text(json.dumps(index, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

          git add reports/backtests/real_data/
          if git diff --cached --quiet; then
            echo "No backtest report changes to commit."
            exit 0
          fi
          git commit -m "Persist BT131/BT132/BT133/BT134/BT139/BT176 real-data backtest reports (${GITHUB_RUN_ID_VALUE})"
          git push

      - name: Upload real-data backtest evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bt131-real-data-backtest-evidence-${{ github.run_id }}
          path: |
            reports/backtests/*.json
            reports/backtests/*.md
            reports/backtests/real_data/**/*.json
            reports/backtests/real_data/**/*.md
            reports/backtests/real_data/**/*.csv
            data/historical/metadata/*.json
            data/historical/metadata/*.csv
            data/trade_plans/*.json
            data/trade_plans/*manifest*.json
          if-no-files-found: error
          retention-days: 90
