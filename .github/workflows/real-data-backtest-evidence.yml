name: Real Data Backtest Evidence

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Evidence run id"
        required: true
        default: "real-data-backtest-manual"
      plans_file:
        description: "Real trade plans JSON path"
        required: true
        default: "reports/signals/latest-signals.json"
      bars_root:
        description: "Historical bars root"
        required: true
        default: "data/historical/bars/1day"
      universe:
        description: "Survivorship universe CSV path"
        required: true
        default: "data/universe/survivorship_universe.csv"
      coverage_manifest:
        description: "Coverage manifest JSON path"
        required: true
        default: "data/historical/metadata/coverage_manifest.json"

permissions:
  contents: read

jobs:
  real-data-backtest-evidence:
    name: Build real-data backtest evidence pack
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run real-data backtest evidence pack
        id: backtest
        continue-on-error: true
        run: |
          mkdir -p reports/backtests
          set +e
          python scripts/run_historical_entry_exit_backtest.py \
            --real-data \
            --data-source real_data \
            --run-id "${{ github.event.inputs.run_id }}" \
            --plans-file "${{ github.event.inputs.plans_file }}" \
            --bars-root "${{ github.event.inputs.bars_root }}" \
            --universe "${{ github.event.inputs.universe }}" \
            --coverage-manifest "${{ github.event.inputs.coverage_manifest }}" \
            --json-output reports/backtests/real-data-backtest-evidence.json \
            --markdown-output reports/backtests/real-data-backtest-evidence.md
          STATUS=$?
          echo "$STATUS" > reports/backtests/real-data-backtest-exit-code.txt
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload real-data backtest evidence pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-data-backtest-evidence-${{ github.event.inputs.run_id }}
          if-no-files-found: error
          path: |
            reports/backtests/real-data-backtest-evidence.json
            reports/backtests/real-data-backtest-evidence.md
            reports/backtests/real-data-backtest-exit-code.txt

      - name: Fail workflow when real-data backtest is blocked or failed
        if: ${{ steps.backtest.outputs.exit_code != '0' }}
        run: |
          echo "Real-data backtest evidence pack was produced but the run was blocked or failed. Review uploaded artifact."
          exit 1
