name: ARCH106 Module Inventory Guard

on:
  push:
    branches:
      - main
    paths:
      - "src/**/*.py"
      - "scripts/generate_module_inventory.py"
      - "scripts/promote_arch106_memory_experimental_candidates.py"
      - "scripts/promote_arch106_operations_quarantine_candidates.py"
      - "scripts/promote_arch106_os_delete_candidates.py"
      - "scripts/promote_arch106_reporting_support_modules.py"
      - "scripts/promote_arch106_runtime_delete_candidates.py"
      - "scripts/promote_arch106_runtime_quarantine_candidates.py"
      - "scripts/promote_arch106_signal_helpers.py"
      - "docs/architecture/module_classification.json"
      - "docs/architecture/module_inventory.generated.json"
      - "docs/architecture/arch106_reporting_runtime_candidates.md"
      - "tests/test_arch106_memory_experimental_promotion.py"
      - "tests/test_arch106_module_inventory_guard.py"
      - "tests/test_arch106_operations_quarantine_promotion.py"
      - "tests/test_arch106_os_delete_candidate_promotion.py"
      - "tests/test_arch106_reporting_runtime_candidates.py"
      - "tests/test_arch106_reporting_support_promotion.py"
      - "tests/test_arch106_runtime_delete_candidate_promotion.py"
      - "tests/test_arch106_runtime_quarantine_promotion.py"
      - "tests/test_arch106_signal_helper_promotion.py"
      - "tests/test_arch106_signal_runtime_helper_proof.py"
      - "tests/test_architecture_runtime_execution_guard.py"
      - ".github/workflows/arch106-module-inventory.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**/*.py"
      - "scripts/generate_module_inventory.py"
      - "scripts/promote_arch106_memory_experimental_candidates.py"
      - "scripts/promote_arch106_operations_quarantine_candidates.py"
      - "scripts/promote_arch106_os_delete_candidates.py"
      - "scripts/promote_arch106_reporting_support_modules.py"
      - "scripts/promote_arch106_runtime_delete_candidates.py"
      - "scripts/promote_arch106_runtime_quarantine_candidates.py"
      - "scripts/promote_arch106_signal_helpers.py"
      - "docs/architecture/module_classification.json"
      - "docs/architecture/module_inventory.generated.json"
      - "docs/architecture/arch106_reporting_runtime_candidates.md"
      - "tests/test_arch106_memory_experimental_promotion.py"
      - "tests/test_arch106_module_inventory_guard.py"
      - "tests/test_arch106_operations_quarantine_promotion.py"
      - "tests/test_arch106_os_delete_candidate_promotion.py"
      - "tests/test_arch106_reporting_runtime_candidates.py"
      - "tests/test_arch106_reporting_support_promotion.py"
      - "tests/test_arch106_runtime_delete_candidate_promotion.py"
      - "tests/test_arch106_runtime_quarantine_promotion.py"
      - "tests/test_arch106_signal_helper_promotion.py"
      - "tests/test_arch106_signal_runtime_helper_proof.py"
      - "tests/test_architecture_runtime_execution_guard.py"
      - ".github/workflows/arch106-module-inventory.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  arch106-module-inventory:
    name: ARCH106 module inventory and runtime reachability guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ARCH106 inventory artifact freshness and baseline guard
        run: |
          python scripts/generate_module_inventory.py --check

      - name: ARCH106 module inventory regression tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_module_inventory_guard.py -q

      - name: ARCH106 memory experimental promotion tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_memory_experimental_promotion.py -q

      - name: ARCH106 operations quarantine promotion tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_operations_quarantine_promotion.py -q

      - name: ARCH106 OS delete-candidate promotion tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_os_delete_candidate_promotion.py -q

      - name: ARCH106 reporting runtime candidate guard tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_reporting_runtime_candidates.py -q

      - name: ARCH106 reporting support promotion tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_reporting_support_promotion.py -q

      - name: ARCH106 runtime delete-candidate promotion tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_runtime_delete_candidate_promotion.py -q

      - name: ARCH106 runtime quarantine promotion tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_runtime_quarantine_promotion.py -q

      - name: ARCH106 signal helper promotion tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_signal_helper_promotion.py -q

      - name: ARCH106 signal helper runtime proof tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_arch106_signal_runtime_helper_proof.py -q

      - name: ARCH106 runtime execution proof tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_architecture_runtime_execution_guard.py -q
