name: SQLite Persistence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sqlite-persistence:
    name: SQLite Persistence Smoke Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SQLite persistence tests
        run: |
          pytest tests/test_sqlite_persistence.py

      - name: Run SQLite persistence smoke check
        run: |
          python scripts/check_sqlite_persistence.py \
            --db data/runtime/runtime.sqlite \
            --write-smoke-record \
            --json

      - name: Upload SQLite artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-persistence-artifacts
          path: |
            data/runtime/runtime.sqlite
          if-no-files-found: error
