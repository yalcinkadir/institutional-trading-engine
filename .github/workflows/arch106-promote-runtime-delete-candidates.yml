name: ARCH106 Promote Runtime Delete Candidates

on:
  workflow_dispatch:

concurrency:
  group: repo-write-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  promote-runtime-delete-candidates:
    name: Promote ARCH106 runtime delete candidates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Promote runtime delete candidates
        run: |
          python scripts/promote_arch106_runtime_delete_candidates.py

      - name: Verify inventory is current
        run: |
          python scripts/generate_module_inventory.py --check

      - name: Verify runtime delete candidates are classified without deletion
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          target = Path("src/runtime/distributed_tasks.py")
          assert target.exists(), "delete_candidate promotion must not delete files"

          inventory = json.loads(Path("docs/architecture/module_inventory.generated.json").read_text(encoding="utf-8"))
          records = {record["path"]: record for record in inventory["modules"]}
          record = records["src/runtime/distributed_tasks.py"]
          assert record["status"] == "classified", record
          assert record["classification"] == "delete_candidate", record
          assert record["runtime_entrypoint"] is None, record
          assert record["runtime_execution_proof"] is None, record
          assert "separate CI-proven removal PR" in record["notes"], record
          PY

      - name: Persist promotion evidence
        if: always()
        run: |
          mkdir -p artifacts/evidence/arch106-runtime-delete-candidate-promotion
          git status --short > artifacts/evidence/arch106-runtime-delete-candidate-promotion/git-status.txt
          git diff -- docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json \
            > artifacts/evidence/arch106-runtime-delete-candidate-promotion/promotion.diff || true

      - name: Upload promotion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch106-runtime-delete-candidate-promotion-evidence
          path: artifacts/evidence/arch106-runtime-delete-candidate-promotion/
          if-no-files-found: error

      - name: Commit promotion artifacts
        run: |
          if git diff --quiet -- docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json; then
            echo "No ARCH106 runtime delete-candidate promotion changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json
          git commit -m "Promote ARCH106 runtime delete candidates"
          git push
