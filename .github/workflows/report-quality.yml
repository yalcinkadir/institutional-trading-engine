name: Report Quality Validation

on:
  pull_request:
  push:
    branches:
      - main
      - 'feature/**'
    paths-ignore:
      - "reports/**"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: report-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    strategy:
      fail-fast: false
      matrix:
        report_type:
          - premarket
          - postmarket
          - weekly

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate report
        shell: bash
        run: |
          mkdir -p reports
          python scripts/generate_report.py \
            --type "${{ matrix.report_type }}" \
            --output "reports/${{ matrix.report_type }}-report.md"

      - name: Validate report quality
        shell: bash
        run: |
          python scripts/validate_report_quality.py \
            --type "${{ matrix.report_type }}" \
            --file "reports/${{ matrix.report_type }}-report.md" \
            --min-score 60

      - name: Upload validated report artifact
        uses: actions/upload-artifact@v4
        with:
          name: validated-${{ matrix.report_type }}-report
          path: reports/${{ matrix.report_type }}-report.md
          retention-days: 14

  commit-validated-reports:
    name: Commit validated reports
    needs: validate-reports
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Synchronize branch before report commit
        shell: bash
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Download validated reports
        uses: actions/download-artifact@v4
        with:
          pattern: validated-*-report
          path: reports
          merge-multiple: true

      - name: Show downloaded reports
        shell: bash
        run: |
          find reports -maxdepth 2 -type f -name '*report.md' -print

      - name: Commit validated reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/*report.md 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No validated report changes to commit."
            exit 0
          fi

          git commit -m "Update validated reports $(date -u +'%Y-%m-%d_%H-%M-%S_UTC')"
          git push origin "HEAD:${GITHUB_REF_NAME}"
