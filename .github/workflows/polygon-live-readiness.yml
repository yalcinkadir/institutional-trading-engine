name: Polygon Live Readiness

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols for readiness/historical smoke test"
        required: false
        default: "SPY,QQQ,NVDA,AAPL,MSFT,AMD,TSLA,META,GOOGL,AMZN"
      lookback_days:
        description: "Historical lookback days for readiness check"
        required: false
        default: "3650"
      smoke_symbol:
        description: "One symbol for real Polygon ingestion smoke test"
        required: false
        default: "SPY"
      smoke_start_date:
        description: "Smoke test start date"
        required: false
        default: "2025-01-01"
      smoke_end_date:
        description: "Smoke test end date"
        required: false
        default: "2025-01-10"

jobs:
  polygon-live-readiness:
    runs-on: ubuntu-latest
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Polygon live readiness
        run: |
          python scripts/check_polygon_live_readiness.py \
            --symbols "${{ github.event.inputs.symbols }}" \
            --lookback-days "${{ github.event.inputs.lookback_days }}"

      - name: Run real Polygon historical smoke ingestion
        run: |
          python scripts/ingest_historical_polygon.py \
            --symbols "${{ github.event.inputs.smoke_symbol }}" \
            --start-date "${{ github.event.inputs.smoke_start_date }}" \
            --end-date "${{ github.event.inputs.smoke_end_date }}" \
            --json

      - name: Show ingestion metadata
        if: always()
        run: |
          if [ -f data/historical/metadata/ingestion_status.json ]; then
            cat data/historical/metadata/ingestion_status.json
          else
            echo "No ingestion metadata produced."
          fi

      - name: Upload historical smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: polygon-live-readiness-artifacts
          path: |
            data/historical/bars/**
            data/historical/metadata/ingestion_status.json
          if-no-files-found: ignore
