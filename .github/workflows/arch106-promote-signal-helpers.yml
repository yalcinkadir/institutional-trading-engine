name: ARCH106 Promote Signal Helpers

on:
  workflow_dispatch:

concurrency:
  group: repo-write-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  promote-signal-helpers:
    name: Promote ARCH106 signal helpers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Promote signal helper runtime candidates
        run: |
          python scripts/promote_arch106_signal_helpers.py

      - name: Verify inventory is current
        run: |
          python scripts/generate_module_inventory.py --check

      - name: Verify promoted signal helpers are connected runtime
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          inventory = json.loads(Path("docs/architecture/module_inventory.generated.json").read_text(encoding="utf-8"))
          records = {record["path"]: record for record in inventory["modules"]}
          for path in [
              "src/signals/entry_quality.py",
              "src/signals/exit_target_quality.py",
              "src/signals/signal_identity.py",
              "src/signals/stop_loss_quality.py",
              "src/signals/trade_plan_validator.py",
          ]:
              record = records[path]
              assert record["status"] == "classified", record
              assert record["classification"] == "connected_runtime", record
              assert record["runtime_entrypoint"] == "src/signals/signal_generator.py", record
              assert record["runtime_execution_proof"], record
          PY

      - name: Persist promotion evidence
        if: always()
        run: |
          mkdir -p artifacts/evidence/arch106-signal-helper-promotion
          git status --short > artifacts/evidence/arch106-signal-helper-promotion/git-status.txt
          git diff -- docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json \
            > artifacts/evidence/arch106-signal-helper-promotion/promotion.diff || true

      - name: Upload promotion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch106-signal-helper-promotion-evidence
          path: artifacts/evidence/arch106-signal-helper-promotion/
          if-no-files-found: error

      - name: Commit promotion artifacts
        run: |
          if git diff --quiet -- docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json; then
            echo "No ARCH106 signal helper promotion changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json
          git commit -m "Promote ARCH106 signal helper runtime candidates"
          git push
