name: Institutional Reports

on:
  schedule:
    - cron: "30 12 * * 0-5"
    - cron: "0 15 * * 1-5"
    - cron: "0 21 * * 1-5"
    - cron: "0 8 * * 6"

  workflow_dispatch:
    inputs:
      report_type:
        description: "Report type to generate"
        required: true
        default: "premarket"
        type: choice
        options:
          - premarket
          - intraday
          - postmarket
          - weekly

permissions:
  contents: write

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  report:
    name: Generate ${{ github.event.inputs.report_type || 'scheduled' }} report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve report type
        id: report_type
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REPORT_TYPE="${{ github.event.inputs.report_type }}"
          elif [[ "${{ github.event.schedule }}" == "30 12 * * 0-5" ]]; then
            REPORT_TYPE="premarket"
          elif [[ "${{ github.event.schedule }}" == "0 15 * * 1-5" ]]; then
            REPORT_TYPE="intraday"
          elif [[ "${{ github.event.schedule }}" == "0 21 * * 1-5" ]]; then
            REPORT_TYPE="postmarket"
          else
            REPORT_TYPE="weekly"
          fi

          RUN_DATE="$(date -u +'%Y-%m-%d')"
          RUN_TIMESTAMP="$(date -u +'%Y-%m-%d_%H-%M-%S_UTC')"
          HEALTH_RUN_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ISO_WEEK="$(date -u +'%G-W%V')"

          if [[ "$REPORT_TYPE" == "weekly" ]]; then
            REPORT_DIR="reports/weekly"
            REPORT_FILE="${REPORT_DIR}/${ISO_WEEK}-weekly.md"
          else
            REPORT_DIR="reports/${REPORT_TYPE}"
            REPORT_FILE="${REPORT_DIR}/${RUN_DATE}-${REPORT_TYPE}.md"
          fi

          LATEST_FILE="reports/generated/${REPORT_TYPE}-report.md"

          echo "report_type=${REPORT_TYPE}" >> "$GITHUB_OUTPUT"
          echo "report_file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"
          echo "latest_file=${LATEST_FILE}" >> "$GITHUB_OUTPUT"
          echo "run_date=${RUN_DATE}" >> "$GITHUB_OUTPUT"
          echo "run_timestamp=${RUN_TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "health_run_timestamp=${HEALTH_RUN_TIMESTAMP}" >> "$GITHUB_OUTPUT"

          echo "REPORT_TYPE=${REPORT_TYPE}" >> "$GITHUB_ENV"
          echo "REPORT_FILE=${REPORT_FILE}" >> "$GITHUB_ENV"
          echo "LATEST_FILE=${LATEST_FILE}" >> "$GITHUB_ENV"
          echo "RUN_DATE=${RUN_DATE}" >> "$GITHUB_ENV"
          echo "RUN_TIMESTAMP=${RUN_TIMESTAMP}" >> "$GITHUB_ENV"
          echo "HEALTH_RUN_TIMESTAMP=${HEALTH_RUN_TIMESTAMP}" >> "$GITHUB_ENV"

      - name: Generate report (+ signals)
        shell: bash
        run: |
          mkdir -p "$(dirname "$REPORT_FILE")"
          mkdir -p "$(dirname "$LATEST_FILE")"
          mkdir -p reports/signals
          mkdir -p data

          GENERATOR_TYPE="$REPORT_TYPE"
          if [[ "$REPORT_TYPE" == "intraday" ]]; then
            GENERATOR_TYPE="premarket"
          fi

          python scripts/generate_report.py --type "$GENERATOR_TYPE" --output "$REPORT_FILE"
          cp "$REPORT_FILE" "$LATEST_FILE"

          echo "--- Generated files ---"
          find reports -maxdepth 3 -type f \( -name "*.md" -o -name "*.json" \) | sort

      - name: Validate report quality
        shell: bash
        run: |
          VALIDATION_TYPE="$REPORT_TYPE"
          if [[ "$VALIDATION_TYPE" == "intraday" ]]; then
            VALIDATION_TYPE="premarket"
          fi

          python scripts/validate_report_quality.py \
            --type "$VALIDATION_TYPE" \
            --file "$REPORT_FILE" \
            --min-score 75

      - name: Validate paper observation health
        if: env.REPORT_TYPE != 'weekly'
        shell: bash
        run: |
          python scripts/validate_paper_observation_health.py \
            --signals-file reports/signals/latest-signals.json \
            --report-dir reports/validation \
            --run-timestamp "$HEALTH_RUN_TIMESTAMP" \
            --workflow-name "${GITHUB_WORKFLOW}" \
            --commit-sha "${GITHUB_SHA}"

      - name: Validate scheduled report liveness
        if: always()
        shell: bash
        run: |
          python scripts/validate_scheduled_report_liveness.py \
            --report-type "$REPORT_TYPE" \
            --report-file "$REPORT_FILE" \
            --latest-file "$LATEST_FILE" \
            --signals-file reports/signals/latest-signals.json \
            --paper-health-file reports/validation/latest-paper-observation-health.json \
            --report-root "." \
            --run-timestamp "$HEALTH_RUN_TIMESTAMP" \
            --workflow-name "${GITHUB_WORKFLOW}" \
            --commit-sha "${GITHUB_SHA}" \
            --run-date "$RUN_DATE"

      - name: Commit all outputs to repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$REPORT_FILE" "$LATEST_FILE"
          git add reports/signals/*.json reports/signals/*.md 2>/dev/null || true
          git add reports/validation/*.json reports/validation/*.md 2>/dev/null || true
          git add reports/scheduled_report_liveness/*.json 2>/dev/null || true
          git add reports/health/report-liveness-latest.json 2>/dev/null || true
          git add data/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Archive ${REPORT_TYPE} report + signals ${RUN_TIMESTAMP}"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload dated report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.report_type.outputs.report_type }}-${{ steps.report_type.outputs.run_timestamp }}
          path: ${{ steps.report_type.outputs.report_file }}
          if-no-files-found: error
          retention-days: 90

      - name: Upload latest generated report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-${{ steps.report_type.outputs.report_type }}-${{ steps.report_type.outputs.run_timestamp }}
          path: ${{ steps.report_type.outputs.latest_file }}
          if-no-files-found: error
          retention-days: 90

      - name: Upload signals artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ steps.report_type.outputs.run_timestamp }}
          path: reports/signals/
          if-no-files-found: error
          retention-days: 90

      - name: Upload paper observation health artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-observation-health-${{ steps.report_type.outputs.run_timestamp }}
          path: |
            reports/validation/paper_observation_health.json
            reports/validation/paper_observation_health.md
            reports/validation/latest-paper-observation-health.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload scheduled report liveness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-report-liveness-${{ steps.report_type.outputs.run_timestamp }}
          path: |
            reports/scheduled_report_liveness/*.json
            reports/health/report-liveness-latest.json
          if-no-files-found: warn
          retention-days: 90

      - name: Upload full reports archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-archive-${{ steps.report_type.outputs.run_timestamp }}
          path: reports/
          if-no-files-found: error
          retention-days: 90

      - name: Build Telegram summary
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        shell: bash
        run: |
          REGIME=$(grep -m1 "^- Regime:" "$REPORT_FILE" | sed 's/- Regime: //' || true)
          HEALTH=$(grep -m1 "^- Market Health Score:" "$REPORT_FILE" | sed 's/- Market Health Score: //' || true)
          APPROVED=$(grep -m1 "^- Approved" "$REPORT_FILE" | sed 's/- Approved.*: //' || true)
          SUMMARY_LINE=$(grep -m1 "^- Decision context\|^- No high-quality\|^- Hard risk" "$REPORT_FILE" | sed 's/^- //' || true)
          SETUPS=$(grep "^#### " "$REPORT_FILE" | head -3 | sed 's/#### //' | tr '\n' ', ' | sed 's/, $//' || true)

          {
            echo "TELEGRAM_SUMMARY<<EOF"
            echo "📊 ITE ${REPORT_TYPE^} Report — $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "📈 Regime: ${REGIME}"
            echo "🏥 Health Score: ${HEALTH}"
            echo "✅ Approved: ${APPROVED}"
            if [[ -n "$SETUPS" ]]; then
              echo "🎯 Setups: ${SETUPS}"
            fi
            if [[ -n "$SUMMARY_LINE" ]]; then
              echo ""
              echo "💬 ${SUMMARY_LINE}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send Telegram summary
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        shell: bash
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$TELEGRAM_SUMMARY"

      - name: Send report document to Telegram
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        shell: bash
        run: |
          TITLE="ITE ${REPORT_TYPE} report — ${RUN_TIMESTAMP}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document="@${REPORT_FILE}" \
            -F caption="$TITLE"
