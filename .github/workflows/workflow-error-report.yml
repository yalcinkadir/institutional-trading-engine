name: Workflow Error Report

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of failed workflow runs to include"
        required: false
        default: "10"
      since_date:
        description: "Only include failed runs after this ISO date, e.g. 2026-05-20T20:50:00Z"
        required: false
        default: ""
      lookback_hours:
        description: "Default lookback window when since_date is empty"
        required: false
        default: "24"
  schedule:
    - cron: "15 7 * * *"

permissions:
  actions: read
  contents: write

concurrency:
  group: repo-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  workflow-error-report:
    name: Generate workflow error report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate workflow error report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          SINCE_DATE="${{ github.event.inputs.since_date || '' }}"
          LOOKBACK_HOURS="${{ github.event.inputs.lookback_hours || '24' }}"

          if [[ -n "$SINCE_DATE" ]]; then
            python scripts/generate_workflow_error_report.py --limit "$LIMIT" --since-date "$SINCE_DATE"
          else
            python scripts/generate_workflow_error_report.py --limit "$LIMIT" --lookback-hours "$LOOKBACK_HOURS"
          fi

      - name: Commit workflow error report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/workflow-errors/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No workflow error report changes to commit."
            exit 0
          fi

          git commit -m "Update workflow error report $(date -u +'%Y-%m-%d_%H-%M-%S_UTC')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload workflow error report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-error-report-${{ github.run_id }}
          path: reports/workflow-errors/
          retention-days: 30
