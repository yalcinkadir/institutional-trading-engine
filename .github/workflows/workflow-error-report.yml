name: Workflow Error Report

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of failed workflow runs to include"
        required: false
        default: "10"
  schedule:
    # Daily at 07:15 UTC
    - cron: "15 7 * * *"

permissions:
  actions: read
  contents: write

jobs:
  workflow-error-report:
    name: Generate workflow error report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate workflow error report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          python scripts/generate_workflow_error_report.py --limit "$LIMIT"

      - name: Commit workflow error report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- reports/workflow-errors/ && git diff --cached --quiet -- reports/workflow-errors/; then
            echo "No workflow error report changes to commit."
          else
            git stash push --include-untracked -- reports/workflow-errors/
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git stash pop
            git add reports/workflow-errors/ 2>/dev/null || true
            git commit -m "Update workflow error report $(date -u +'%Y-%m-%d_%H-%M-%S_UTC')"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload workflow error report artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-error-report-${{ github.run_id }}
          path: reports/workflow-errors/
          retention-days: 30
