name: Outcome Tracking

on:
  schedule:
    # Daily outcome generation
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  outcomes:
    name: Generate Institutional Outcomes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate outcome reports
        run: |
          python scripts/generate_outcomes.py

      - name: Commit outcome reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/outcomes/

          if git diff --cached --quiet; then
            echo "No outcome changes to commit"
          else
            git commit -m "Update institutional outcomes"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload outcome artifacts
        uses: actions/upload-artifact@v4
        with:
          name: institutional-outcomes
          path: reports/outcomes/
          retention-days: 90
