name: Outcome Tracking

on:
  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      days:
        description: "Number of past days to evaluate"
        required: false
        default: "7"

permissions:
  contents: read

concurrency:
  group: outcome-tracking-${{ github.ref }}
  cancel-in-progress: false

jobs:
  outcomes:
    name: Generate Institutional Outcome Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure required directories exist
        run: |
          mkdir -p reports/outcomes
          mkdir -p data

      - name: Generate outcome reports
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          python scripts/generate_outcomes.py --days "$DAYS" --mode production

      - name: Augment P165/#186 outcome manifest
        run: |
          python scripts/augment_outcome_manifest_p165.py --outcomes-dir reports/outcomes

      - name: Validate P165/#186 outcome manifest
        run: |
          python scripts/validate_outcome_manifest_p165.py --manifest reports/outcomes/outcome-run-manifest.json

      - name: Check outcome learning eligibility
        id: outcome_manifest
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          manifest = json.loads(Path("reports/outcomes/outcome-run-manifest.json").read_text(encoding="utf-8"))
          allowed = bool(manifest.get("outcome_learning_claim_allowed"))
          print(f"allowed={'true' if allowed else 'false'}")
          print(f"run_status={manifest.get('run_status')}")
          print(f"valid_signal_count={manifest.get('valid_signal_count')}")
          print(f"evaluated_outcome_count={manifest.get('evaluated_outcome_count')}")
          PY

      - name: Run expectancy learning pipeline
        if: steps.outcome_manifest.outputs.allowed == 'true'
        shell: bash
        run: |
          if [[ -f data/decision_log.csv ]]; then
            echo "Using decision_log.csv"
            python scripts/update_outcomes.py \
              --decision-log data/decision_log.csv \
              --output reports/expectancy-report.md

          elif [[ -f data/decision_log.jsonl ]]; then
            echo "Using decision_log.jsonl"
            python scripts/update_outcomes.py \
              --decision-log data/decision_log.jsonl \
              --output reports/expectancy-report.md || true

          else
            echo "No decision log found. Skipping expectancy learning."
          fi

      - name: Skip expectancy learning for blocked/no-data outcome runs
        if: steps.outcome_manifest.outputs.allowed != 'true'
        run: |
          echo "Outcome learning skipped. run_status=${{ steps.outcome_manifest.outputs.run_status }} valid_signal_count=${{ steps.outcome_manifest.outputs.valid_signal_count }} evaluated_outcome_count=${{ steps.outcome_manifest.outputs.evaluated_outcome_count }}"

      - name: Upload outcome artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: institutional-outcomes-${{ github.run_id }}
          path: reports/outcomes/
          retention-days: 90

      - name: Upload runtime evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outcome-runtime-evidence-${{ github.run_id }}
          path: |
            reports/outcomes/
            reports/expectancy-report.md
            data/
          retention-days: 90
