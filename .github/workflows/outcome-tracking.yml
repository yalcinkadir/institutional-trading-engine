name: Outcome Tracking

on:
  schedule:
    # Daily at 02:00 UTC — after previous day bars are available
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Number of past days to evaluate"
        required: false
        default: "7"

permissions:
  contents: write

jobs:
  outcomes:
    name: Generate Real Institutional Outcomes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate real outcome reports
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          python scripts/generate_outcomes.py --days "$DAYS"

      - name: Run expectancy learning pipeline
        run: |
          python scripts/update_outcomes.py \
            --decision-log data/decision_log.csv \
            --output reports/expectancy-report.md

      - name: Commit outcome reports and expectancy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/outcomes/
          git add reports/expectancy-report.md
          git add data/

          if git diff --cached --quiet; then
            echo "No outcome changes to commit"
          else
            git commit -m "Update outcomes and expectancy $(date -u +'%Y-%m-%d')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload outcome artifacts
        uses: actions/upload-artifact@v4
        with:
          name: institutional-outcomes-$(date -u +'%Y-%m-%d')
          path: reports/outcomes/
          retention-days: 90
