name: Daily Market Scan

concurrency:
  group: daily-market-scan
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run market scanner
        run: |
          python src/scanner.py

      - name: Build Telegram summary
        run: |
          python - <<'PY'
          from pathlib import Path

          report_path = sorted(
              Path("reports").glob("*.md"),
              key=lambda p: p.stat().st_mtime,
              reverse=True
          )[0]

          lines = report_path.read_text(encoding="utf-8").splitlines()

          def collect_section(section_name):
              collected = []
              inside = False
              for line in lines:
                  if line.strip() == section_name:
                      inside = True
                      continue
                  if inside and line.startswith("## "):
                      break
                  if inside and line.strip():
                      collected.append(line.strip())
              return collected

          regime = collect_section("## Market Regime Summary")
          watchlist = collect_section("## Watchlist Candidates")
          leaders = collect_section("## Leaders")
          weak = collect_section("## Weak Names")
          warnings = collect_section("## Data / Risk Warnings")
          full_report = collect_section("## Full Asset Report")

          def clean_items(items):
              cleaned = []
              for item in items:
                  if item.startswith("- "):
                      cleaned.append(item[2:])
                  elif item.startswith("### "):
                      continue
                  else:
                      cleaned.append(item)
              return cleaned

          regime_items = clean_items(regime)
          watchlist_items = clean_items(watchlist)
          weak_items = clean_items(weak)
          warning_items = clean_items(warnings)
          full_items = clean_items(full_report)

          regime_map = {}
          for item in regime_items:
              if ": " in item:
                  key, value = item.split(": ", 1)
                  regime_map[key] = value

          def extract_names(items):
              names = []
              for item in items:
                  if item == "None":
                      continue
                  name = item.split(":", 1)[0].strip()
                  names.append(name)
              return names

          watchlist_text = "None"
          watchlist_name = None
          watchlist_label = None

          if watchlist_items and watchlist_items[0] != "None":
              first_item = watchlist_items[0]
              watchlist_name = first_item.split(":", 1)[0].strip()

              label = "Watch"
              if ": " in first_item:
                  rest = first_item.split(": ", 1)[1]
                  label = rest.split(" | ", 1)[0].strip()

              watchlist_label = label
              watchlist_text = f"{watchlist_name} ({label})"

          clean_leaders = []
          aggressive_leaders = []
          current_bucket = None
          for raw in leaders:
              line = raw.strip()
              if line == "### Clean Leaders":
                  current_bucket = "clean"
                  continue
              if line == "### Aggressive Leaders":
                  current_bucket = "aggressive"
                  continue
              if line.startswith("- "):
                  item = line[2:]
                  if item == "None":
                      continue
                  name = item.split(":", 1)[0].strip()
                  if current_bucket == "clean":
                      clean_leaders.append(name)
                  elif current_bucket == "aggressive":
                      aggressive_leaders.append(name)

          weak_names = extract_names(weak_items)
          warning_names = extract_names(warning_items)

          regime_value = regime_map.get("Market Regime", "N/A")
          extension = regime_map.get("Extension Status", "N/A")
          risk = regime_map.get("Risk State", "N/A")
          fresh = regime_map.get("Fresh Longs", "N/A")

          import re

          trade_plan_lines = []
          if watchlist_name and watchlist_label:
              for item in full_items:
                  if item.startswith(f"{watchlist_name}:"):

                      def extract_number(label, text):
                          pattern = rf"{re.escape(label)} ([0-9]+(?:\.[0-9]+)?)"
                          match = re.search(pattern, text)
                          if match:
                              return float(match.group(1))
                          return None

                      high = extract_number("High", item)
                      sma20 = extract_number("SMA20", item)
                      sma50 = extract_number("SMA50", item)
                      atr14 = extract_number("ATR14", item)
                      close = extract_number("Close", item)

                      trigger = None
                      entry_zone_low = None
                      entry_zone_high = None
                      stop_loss = None
                      exit_1 = None
                      exit_2 = None

                      if watchlist_label == "Breakout Watch" and atr14 is not None and high is not None:
                          trigger = high
                          entry_zone_low = high
                          entry_zone_high = high + (0.30 * atr14)
                          stop_loss = high - atr14
                          exit_1 = high + (1.5 * atr14)
                          exit_2 = high + (2.5 * atr14)

                      elif watchlist_label == "Pullback Candidate" and atr14 is not None:
                          if sma20 is not None and close is not None and abs((close - sma20) / sma20) <= 0.03:
                              trigger = sma20
                              entry_zone_low = sma20 * 0.995
                              entry_zone_high = sma20 * 1.005
                          elif sma50 is not None:
                              trigger = sma50
                              entry_zone_low = sma50 * 0.995
                              entry_zone_high = sma50 * 1.005

                          if trigger is not None:
                              stop_loss = trigger - atr14
                              exit_1 = trigger + (1.5 * atr14)
                              exit_2 = trigger + (2.5 * atr14)

                      def fmt(x):
                          return f"{x:.2f}" if x is not None else "N/A"

                      if trigger is not None:
                          if watchlist_label == "Breakout Watch":
                              trade_plan_lines = [
                                  f"➡️ Trigger: über {fmt(trigger)}",
                                  f"📍 Entry Zone: {fmt(entry_zone_low)} - {fmt(entry_zone_high)}",
                                  f"🛑 Stop: {fmt(stop_loss)}",
                                  f"🎯 Exit 1: {fmt(exit_1)}",
                                  f"🎯 Exit 2: {fmt(exit_2)}",
                              ]
                          else:
                              trade_plan_lines = [
                                  f"📍 Entry Zone: {fmt(entry_zone_low)} - {fmt(entry_zone_high)}",
                                  f"🛑 Stop: {fmt(stop_loss)}",
                                  f"🎯 Exit 1: {fmt(exit_1)}",
                                  f"🎯 Exit 2: {fmt(exit_2)}",
                              ]
                      break

          message_lines = [
              "📊 Institutional Market Scanner",
              "",
              f"🧭 Regime: {regime_value}",
              f"📏 Extension: {extension}",
              f"⚠️ Risk State: {risk}",
              f"🎯 Fresh Longs: {fresh}",
              "",
              f"👀 Watchlist: {watchlist_text}",
          ]

          if trade_plan_lines:
              message_lines.extend(trade_plan_lines)
              message_lines.append("")

          message_lines.extend([
              f"✅ Clean Leaders: {', '.join(clean_leaders) if clean_leaders else 'None'}",
              f"🔥 Aggressive Leaders: {', '.join(aggressive_leaders) if aggressive_leaders else 'None'}",
              f"❌ Weak Names: {', '.join(weak_names) if weak_names else 'None'}",
              f"🚨 Warnings: {', '.join(warning_names) if warning_names else 'None'}",
          ])

          message = "\n".join(message_lines)
          Path("telegram_message.txt").write_text(message[:4000], encoding="utf-8")
          PY

      - name: Send Telegram summary
        run: |
          MESSAGE=$(cat telegram_message.txt)

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode text="$MESSAGE"

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/
          git commit -m "Add daily market report" || echo "No changes to commit"
          git push
