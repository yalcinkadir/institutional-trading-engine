name: Daily Market Scan

concurrency:
  group: daily-market-scan
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run market scanner
        run: |
          python src/scanner.py

      - name: Build Telegram summary
        run: |
          python - <<'PY'
          from pathlib import Path

          report_path = sorted(
              Path("reports").glob("*.md"),
              key=lambda p: p.stat().st_mtime,
              reverse=True
          )[0]

          lines = report_path.read_text(encoding="utf-8").splitlines()

          def collect_section(section_name):
              collected = []
              inside = False
              for line in lines:
                  if line.strip() == section_name:
                      inside = True
                      continue
                  if inside and line.startswith("## "):
                      break
                  if inside and line.strip():
                      collected.append(line.strip())
              return collected

          regime = collect_section("## Market Regime Summary")
          watchlist = collect_section("## Watchlist Candidates")
          leaders = collect_section("## Leaders")
          weak = collect_section("## Weak Names")
          warnings = collect_section("## Data / Risk Warnings")

          def clean_items(items):
              cleaned = []
              for item in items:
                  if item.startswith("- "):
                      cleaned.append(item[2:])
                  elif item.startswith("### "):
                      continue
                  else:
                      cleaned.append(item)
              return cleaned

          regime_items = clean_items(regime)
          watchlist_items = clean_items(watchlist)
          leaders_items = clean_items(leaders)
          weak_items = clean_items(weak)
          warning_items = clean_items(warnings)

          regime_map = {}
          for item in regime_items:
              if ": " in item:
                  key, value = item.split(": ", 1)
                  regime_map[key] = value

          def extract_names(items):
              names = []
              for item in items:
                  if item == "None":
                      continue
                  name = item.split(":", 1)[0].strip()
                  names.append(name)
              return names

          watchlist_text = "None"
          if watchlist_items and watchlist_items[0] != "None":
              watchlist_text = "; ".join(watchlist_items[:3])

          clean_leaders = []
          aggressive_leaders = []
          current_bucket = None
          for raw in leaders:
              line = raw.strip()
              if line == "### Clean Leaders":
                  current_bucket = "clean"
                  continue
              if line == "### Aggressive Leaders":
                  current_bucket = "aggressive"
                  continue
              if line.startswith("- "):
                  item = line[2:]
                  if item == "None":
                      continue
                  name = item.split(":", 1)[0].strip()
                  if current_bucket == "clean":
                      clean_leaders.append(name)
                  elif current_bucket == "aggressive":
                      aggressive_leaders.append(name)

          weak_names = extract_names(weak_items)
          warning_names = extract_names(warning_items)

          message_lines = [
              "📊 Institutional Market Scanner",
              "",
              f"Regime: {regime_map.get('Market Regime', 'N/A')} | {regime_map.get('Extension Status', 'N/A')} | {regime_map.get('Risk State', 'N/A')} | Fresh Longs: {regime_map.get('Fresh Longs', 'N/A')}",
              f"Watchlist: {watchlist_text}",
              f"Clean Leaders: {', '.join(clean_leaders) if clean_leaders else 'None'}",
              f"Aggressive Leaders: {', '.join(aggressive_leaders) if aggressive_leaders else 'None'}",
              f"Weak Names: {', '.join(weak_names) if weak_names else 'None'}",
              f"Warnings: {', '.join(warning_names) if warning_names else 'None'}",
          ]

          message = "\n".join(message_lines)
          Path("telegram_message.txt").write_text(message[:4000], encoding="utf-8")
          PY

      - name: Send Telegram summary
        run: |
          MESSAGE=$(cat telegram_message.txt)

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/
          git commit -m "Add daily market report" || echo "No changes to commit"
          git push
