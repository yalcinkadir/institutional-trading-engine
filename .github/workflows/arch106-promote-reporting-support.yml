name: ARCH106 Promote Reporting Support

on:
  workflow_dispatch:

concurrency:
  group: repo-write-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  promote-reporting-support:
    name: Promote ARCH106 reporting support modules
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Promote reporting support modules
        run: |
          python scripts/promote_arch106_reporting_support_modules.py

      - name: Verify inventory is current
        run: |
          python scripts/generate_module_inventory.py --check

      - name: Verify reporting support modules are experimental
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          inventory = json.loads(Path("docs/architecture/module_inventory.generated.json").read_text(encoding="utf-8"))
          records = {record["path"]: record for record in inventory["modules"]}
          for path in [
              "src/reporting/report_quality.py",
              "src/reporting/tg2_tg3_report_templates.py",
              "src/reporting/trade_summary.py",
              "src/reporting/weekly_summary.py",
          ]:
              record = records[path]
              assert record["status"] == "classified", record
              assert record["classification"] == "experimental", record
              assert record["runtime_entrypoint"] is None, record
              assert record["runtime_execution_proof"] is None, record
          PY

      - name: Persist promotion evidence
        if: always()
        run: |
          mkdir -p artifacts/evidence/arch106-reporting-support-promotion
          git status --short > artifacts/evidence/arch106-reporting-support-promotion/git-status.txt
          git diff -- docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json \
            > artifacts/evidence/arch106-reporting-support-promotion/promotion.diff || true

      - name: Upload promotion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch106-reporting-support-promotion-evidence
          path: artifacts/evidence/arch106-reporting-support-promotion/
          if-no-files-found: error

      - name: Commit promotion artifacts
        run: |
          if git diff --quiet -- docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json; then
            echo "No ARCH106 reporting support promotion changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/architecture/module_classification.json docs/architecture/module_inventory.generated.json
          git commit -m "Promote ARCH106 reporting support modules"
          git push
