name: PO11 Scheduled Daily Observation

on:
  schedule:
    - cron: "15 22 * * 1-5"
  workflow_dispatch:
    inputs:
      observation_date:
        description: "Observation date in YYYY-MM-DD format, or auto for current UTC date."
        required: false
        default: "auto"
        type: string
      minimum_records:
        description: "Minimum records required for PO9 gate evaluation."
        required: false
        default: "1"
        type: string
      selected_symbols:
        description: "Comma-separated paper observation symbols. Defaults to configured P166 universe."
        required: false
        default: "MSFT,NVDA,META,AAPL,MU,QQQ,GLD,SLV"
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  scheduled-daily-observation:
    name: Build PO10 daily observation artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      VOLATILITY_PROXY_SYMBOL: ${{ vars.VOLATILITY_PROXY_SYMBOL || 'VIXY' }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Produce P166 daily observation evidence
        env:
          OBSERVATION_DATE: ${{ inputs.observation_date }}
          SELECTED_SYMBOLS: ${{ inputs.selected_symbols }}
        run: |
          observation_date="${OBSERVATION_DATE:-auto}"
          if [ "$observation_date" = "auto" ]; then
            observation_date="$(date -u +%F)"
          fi
          args=(--observation-date "$observation_date")
          if [ -n "${SELECTED_SYMBOLS:-}" ]; then
            args+=(--selected-symbols "$SELECTED_SYMBOLS")
          fi
          python scripts/produce_daily_observation_evidence_p166.py "${args[@]}"

      - name: Run PO10 daily observation automation
        env:
          OBSERVATION_DATE: ${{ inputs.observation_date }}
          MINIMUM_RECORDS: ${{ inputs.minimum_records || '1' }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          from datetime import datetime, timezone
          from pathlib import Path

          from src.operations.daily_observation_automation_runner import (
              build_daily_observation_automation_artifact,
              write_daily_observation_automation_artifact,
          )

          raw_observation_date = os.environ.get("OBSERVATION_DATE") or "auto"
          if raw_observation_date == "auto":
              observation_date = datetime.now(timezone.utc).date().isoformat()
          else:
              observation_date = raw_observation_date
          minimum_records = int(os.environ.get("MINIMUM_RECORDS") or "1")
          created_at = f"{observation_date}T00:00:00Z"

          result = build_daily_observation_automation_artifact(
              observation_date=observation_date,
              artifact_paths=[f"reports/daily_evidence/{observation_date}.json"],
              minimum_records=minimum_records,
              created_at=created_at,
              require_artifact_paths_exist=True,
          )
          write_result = write_daily_observation_automation_artifact(result=result)

          print(f"PO11 observation_date={observation_date}")
          print(f"PO11 artifact_path={write_result.artifact_path}")
          print(f"PO11 automation_status={write_result.artifact['automation_status']}")
          print(f"PO11 live_trading_authorized={write_result.artifact['live_trading_authorized']}")
          print(f"PO11 broker_execution_mode={write_result.artifact['broker_execution_mode']}")

          artifact_path = Path(write_result.artifact_path)
          if not artifact_path.exists():
              raise SystemExit("PO11 automation artifact was not written")
          if write_result.artifact["live_trading_authorized"] is not False:
              raise SystemExit("PO11 must not authorize live trading")
          if write_result.artifact["broker_execution_mode"] != "paper_only":
              raise SystemExit("PO11 must remain paper_only")
          if write_result.artifact["automation_status"] != "PASSED":
              raise SystemExit("PO11 blocked: referenced daily evidence artifact is missing or invalid")
          PY

      - name: Upload daily evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p166-daily-observation-evidence
          path: reports/daily_evidence/*.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload PO11 automation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: po11-daily-observation-artifact
          path: reports/daily_observation_automation/*.json
          if-no-files-found: error
          retention-days: 90
