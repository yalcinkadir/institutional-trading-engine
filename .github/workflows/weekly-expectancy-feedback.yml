name: Weekly Expectancy Feedback

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      decision_log:
        description: "Decision log path"
        required: false
        default: "data/decision_log.csv"
      days:
        description: "Daily bars lookback for outcome updates"
        required: false
        default: "120"

permissions:
  contents: write
  actions: read

concurrency:
  group: weekly-expectancy-feedback-${{ github.ref }}
  cancel-in-progress: false

jobs:
  weekly-expectancy:
    name: Generate Weekly Expectancy Feedback
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REPORT_WEBHOOK_URL: ${{ secrets.REPORT_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve inputs
        shell: bash
        run: |
          DECISION_LOG="data/decision_log.csv"
          LOOKBACK_DAYS="120"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DECISION_LOG="${{ github.event.inputs.decision_log }}"
            LOOKBACK_DAYS="${{ github.event.inputs.days }}"
          fi
          if [ -z "$DECISION_LOG" ]; then DECISION_LOG="data/decision_log.csv"; fi
          if [ -z "$LOOKBACK_DAYS" ]; then LOOKBACK_DAYS="120"; fi
          echo "DECISION_LOG=$DECISION_LOG" >> "$GITHUB_ENV"
          echo "LOOKBACK_DAYS=$LOOKBACK_DAYS" >> "$GITHUB_ENV"
          echo "EXPECTANCY_CYCLE_ID=weekly-expectancy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Generate expectancy report
        shell: bash
        run: |
          mkdir -p reports
          if [ ! -f "$DECISION_LOG" ]; then
            echo "Decision log not found: $DECISION_LOG"
            echo "# Weekly Expectancy Feedback" > reports/expectancy-report.md
            echo "" >> reports/expectancy-report.md
            echo "Status: SKIPPED" >> reports/expectancy-report.md
            echo "" >> reports/expectancy-report.md
            echo "Reason: decision log not found at $DECISION_LOG" >> reports/expectancy-report.md
            echo "Weekly Expectancy Feedback SKIPPED" > reports/weekly-expectancy-summary.txt
            echo "Reason: decision log not found at $DECISION_LOG" >> reports/weekly-expectancy-summary.txt
            exit 0
          fi
          if [ -n "${POLYGON_API_KEY:-}" ]; then
            python scripts/update_outcomes.py --decision-log "$DECISION_LOG" --output reports/expectancy-report.md --days "$LOOKBACK_DAYS"
          else
            python scripts/build_weekly_expectancy_summary.py --decision-log "$DECISION_LOG" --output reports/weekly-expectancy-summary.txt
            echo "# Weekly Expectancy Feedback" > reports/expectancy-report.md
            cat reports/weekly-expectancy-summary.txt >> reports/expectancy-report.md
          fi

      - name: Build weekly summary
        shell: bash
        run: |
          if [ ! -f reports/weekly-expectancy-summary.txt ]; then
            python scripts/build_weekly_expectancy_summary.py --decision-log "$DECISION_LOG" --output reports/weekly-expectancy-summary.txt
          fi

      - name: Commit expectancy outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/expectancy-report.md reports/weekly-expectancy-summary.txt data/decision_log.csv data/decision_log.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No expectancy output changes to commit."
            exit 0
          fi
          git commit -m "Update weekly expectancy feedback ${EXPECTANCY_CYCLE_ID}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Send weekly summary notification
        if: success()
        shell: bash
        run: |
          if [ -f reports/weekly-expectancy-summary.txt ]; then
            python scripts/send_notification.py --message-file reports/weekly-expectancy-summary.txt --telegram --webhook || true
          fi

      - name: Upload expectancy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-expectancy-feedback-${{ github.run_id }}
          path: |
            reports/expectancy-report.md
            reports/weekly-expectancy-summary.txt
          if-no-files-found: ignore
          retention-days: 90
