name: BT6 Evidence Baseline Regression Gate

on:
  push:
    paths:
      - "src/validation/evidence_baseline_regression_gate.py"
      - "tests/test_bt6_evidence_baseline_regression_gate.py"
      - "scripts/generate_bt6_baseline_regression_report.py"
      - "data/demo_bt6_evidence_baseline.json"
      - ".github/workflows/bt6.yml"
  pull_request:
    paths:
      - "src/validation/evidence_baseline_regression_gate.py"
      - "tests/test_bt6_evidence_baseline_regression_gate.py"
      - "scripts/generate_bt6_baseline_regression_report.py"
      - "data/demo_bt6_evidence_baseline.json"
      - ".github/workflows/bt6.yml"
  workflow_dispatch:

jobs:
  bt6:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run BT6 evidence baseline regression tests
        run: pytest tests/test_bt6_evidence_baseline_regression_gate.py -q

      - name: Generate BT6 demo report
        run: python scripts/generate_bt6_baseline_regression_report.py --demo
