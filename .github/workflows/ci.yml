name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "reports/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: GOV1-GOV3 runtime governance hardening tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_live_runtime_cycle.py -q
          pytest tests/test_portfolio_state.py -q
          pytest tests/test_entry_quality.py -q
          pytest tests/test_stop_loss_quality.py -q

      - name: GOV4-GOV6 runtime stability hardening tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_negative_override.py -q
          pytest tests/test_runtime_state.py -q
          pytest tests/test_runtime_loop.py -q

      - name: GOV7-GOV10 pre-live hygiene tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_gov7_gov10_pre_live_hygiene.py -q

      - name: EV1-EV2 Sharpe definition regression tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_sharpe_definition_regression.py -q

      - name: EV3-EV6 backtest fidelity tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_backtest_fidelity_ev3_ev6.py -q

      - name: EV7 decision ranking regression tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_decision_engine.py -q

      - name: EV8 fixed-date holdout semantics regression tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_out_of_sample_lockbox.py -q

      - name: EV10 profit-factor infinity regression tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_historical_edge_validation.py -q

      - name: EV11 conservative setup scoring regression tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_setup_scoring.py -q

      - name: EV12 drawdown magnitude regression tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_ev12_drawdown_magnitude.py -q

      - name: EV evidence consolidation guard tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_ev_evidence_consolidation.py -q

      - name: Roadmap EV completion guard tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_roadmap_ev_completion_guard.py -q

      - name: Full-suite flake review policy guard tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_full_suite_flake_review_policy.py -q

      - name: Evidence artifact index guard tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_evidence_artifact_index.py -q

      - name: B1.1 daily evidence operating procedure guard tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_b11_daily_evidence_operating_procedure.py -q

      - name: Phase A stabilization tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_decision_engine.py -q
          pytest tests/test_out_of_sample_lockbox.py -q
          pytest tests/test_slippage_model.py -q
          pytest tests/test_execution_realism.py -q
          pytest tests/test_statistical_robustness.py -q
          pytest tests/test_historical_edge_validation.py -q
          pytest tests/test_polygon_structured_logging.py -q
          pytest tests/test_polygon_data_pipeline.py -q
          pytest tests/test_polygon_cache.py -q

      - name: Phase B1 paper observation tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_paper_observation_reconciliation.py -q

      - name: Phase B1.1 evidence operation discipline tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_b11_evidence_operation_discipline.py -q

      - name: Phase B1.1 paper observation notification tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_paper_observation_notification.py -q

      - name: Phase B2 performance drift tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_performance_drift_detection.py -q

      - name: Phase B3 sequential edge decay tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_sequential_edge_decay.py -q

      - name: Phase B4 regime change detection tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_regime_change_detection.py -q

      - name: Phase B5 position risk attribution tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_position_risk_attribution.py -q

      - name: Phase B6 Monte Carlo robustness tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_monte_carlo_robustness.py -q

      - name: Phase B7 daily evidence report tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_daily_evidence_report.py -q

      - name: Phase B8 daily evidence CLI tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_run_daily_evidence_report_cli.py -q

      - name: Phase B11 input pipeline tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_daily_evidence_input_validation.py -q
          pytest tests/test_daily_evidence_input_builder.py -q
          pytest tests/test_daily_evidence_source_bootstrap.py -q

      - name: Phase B12 persisted source feed tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_daily_observation_source_feed.py -q

      - name: Phase B13 real paper observation source tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_daily_paper_observation_source.py -q

      - name: Phase B15 observation cadence tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_daily_observation_cadence.py -q

      - name: Phase B16 raw paper observation contract tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_paper_observation_raw_contract.py -q

      - name: Phase B17 daily observation runbook tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_daily_observation_runbook.py -q

      - name: Phase C1 paper broker adapter tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_broker_adapter.py -q

      - name: Phase C2 Alpaca paper adapter tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_alpaca_paper_adapter.py -q

      - name: BT2 strategy test matrix tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_strategy_test_matrix.py -q

      - name: BT3 reproducibility contract tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_bt3_backtest_run_contract.py -q

      - name: IP3/IP4 public demo and external edge boundary tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_external_edge_provider.py -q

      - name: IP5/IP6 artifact hygiene tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_artifact_hygiene.py -q

      - name: CL1 core logic remediation tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_setup_scoring.py -q
          pytest tests/test_portfolio_risk.py -q
          pytest tests/test_outcome_tracking.py -q

      - name: CL2/CL3 scoring and drawdown-source governance tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_scoring_audit.py -q
          pytest tests/test_execution_kill_switch.py -q

      - name: CL4 ATR governance tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_atr_governance.py -q

      - name: CL5 regime alignment governance tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_decision_engine.py -q

      - name: Report output boundary guard tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_report_output_boundary.py -q
          pytest tests/test_generate_report_output_boundary.py -q

      - name: BT7 capacity turnover realism tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest tests/test_bt7_capacity_turnover_realism_gate.py -q

      - name: Full regression suite residual tests
        env:
          POLYGON_API_KEY: test-key
        run: |
          pytest -q \
            --ignore=tests/test_artifact_hygiene.py \
            --ignore=tests/test_live_runtime_cycle.py \
            --ignore=tests/test_portfolio_state.py \
            --ignore=tests/test_entry_quality.py \
            --ignore=tests/test_stop_loss_quality.py \
            --ignore=tests/test_negative_override.py \
            --ignore=tests/test_runtime_state.py \
            --ignore=tests/test_runtime_loop.py \
            --ignore=tests/test_gov7_gov10_pre_live_hygiene.py \
            --ignore=tests/test_sharpe_definition_regression.py \
            --ignore=tests/test_backtest_fidelity_ev3_ev6.py \
            --ignore=tests/test_decision_engine.py \
            --ignore=tests/test_out_of_sample_lockbox.py \
            --ignore=tests/test_historical_edge_validation.py \
            --ignore=tests/test_setup_scoring.py \
            --ignore=tests/test_ev12_drawdown_magnitude.py \
            --ignore=tests/test_ev_evidence_consolidation.py \
            --ignore=tests/test_roadmap_ev_completion_guard.py \
            --ignore=tests/test_full_suite_flake_review_policy.py \
            --ignore=tests/test_evidence_artifact_index.py \
            --ignore=tests/test_b11_daily_evidence_operating_procedure.py \
            --ignore=tests/test_slippage_model.py \
            --ignore=tests/test_execution_realism.py \
            --ignore=tests/test_statistical_robustness.py \
            --ignore=tests/test_polygon_structured_logging.py \
            --ignore=tests/test_polygon_data_pipeline.py \
            --ignore=tests/test_polygon_cache.py \
            --ignore=tests/test_paper_observation_reconciliation.py \
            --ignore=tests/test_b11_evidence_operation_discipline.py \
            --ignore=tests/test_paper_observation_notification.py \
            --ignore=tests/test_performance_drift_detection.py \
            --ignore=tests/test_sequential_edge_decay.py \
            --ignore=tests/test_regime_change_detection.py \
            --ignore=tests/test_position_risk_attribution.py \
            --ignore=tests/test_monte_carlo_robustness.py \
            --ignore=tests/test_daily_evidence_report.py \
            --ignore=tests/test_run_daily_evidence_report_cli.py \
            --ignore=tests/test_daily_evidence_input_validation.py \
            --ignore=tests/test_daily_evidence_input_builder.py \
            --ignore=tests/test_daily_evidence_source_bootstrap.py \
            --ignore=tests/test_daily_observation_source_feed.py \
            --ignore=tests/test_daily_paper_observation_source.py \
            --ignore=tests/test_daily_observation_cadence.py \
            --ignore=tests/test_paper_observation_raw_contract.py \
            --ignore=tests/test_daily_observation_runbook.py \
            --ignore=tests/test_broker_adapter.py \
            --ignore=tests/test_alpaca_paper_adapter.py \
            --ignore=tests/test_strategy_test_matrix.py \
            --ignore=tests/test_bt3_backtest_run_contract.py \
            --ignore=tests/test_external_edge_provider.py \
            --ignore=tests/test_portfolio_risk.py \
            --ignore=tests/test_outcome_tracking.py \
            --ignore=tests/test_scoring_audit.py \
            --ignore=tests/test_execution_kill_switch.py \
            --ignore=tests/test_atr_governance.py \
            --ignore=tests/test_report_output_boundary.py \
            --ignore=tests/test_generate_report_output_boundary.py \
            --ignore=tests/test_bt7_capacity_turnover_realism_gate.py \
            -k "not test_decision_log_path_not_in_gitignore"
