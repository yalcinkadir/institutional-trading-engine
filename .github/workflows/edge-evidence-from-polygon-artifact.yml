name: Edge Evidence From Polygon Artifact

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID containing the combined Polygon artifact"
        required: true
      artifact_pattern:
        description: "Combined artifact name pattern"
        required: false
        default: "polygon-edge-runtime-dataset-combined*"
      generate_plans:
        description: "Generate historical trade plans from downloaded Polygon bars before backtest"
        required: false
        default: "true"
      plans_path:
        description: "Historical trade plans JSON path"
        required: false
        default: "data/trade_plans/historical_trade_plans.json"
      max_generated_plans:
        description: "Maximum generated historical trade plans"
        required: false
        default: "5000"
      max_plans_per_symbol:
        description: "Maximum generated plans per symbol"
        required: false
        default: "3"
      survivorship_mode:
        description: "Survivorship audit mode: strict or runtime_active_universe"
        required: false
        default: "runtime_active_universe"
      as_of:
        description: "Universe validation as-of date"
        required: false
        default: "2026-05-24"
      minimum_assets:
        description: "Minimum tradeable universe size"
        required: false
        default: "500"
      oos_split_date:
        description: "Out-of-sample split date"
        required: false
        default: "2024-01-01"
      max_bars_per_plan:
        description: "Maximum bars evaluated per plan"
        required: false
        default: "20"

permissions:
  actions: read
  contents: read

jobs:
  edge-evidence-from-polygon-artifact:
    name: Run Edge Evidence From Combined Polygon Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download combined Polygon artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p runtime_artifacts/polygon_combined_input
          gh run download "${{ inputs.run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${{ inputs.artifact_pattern }}" \
            --dir runtime_artifacts/polygon_combined_input

      - name: Resolve combined dataset paths
        run: |
          UNIVERSE=$(find runtime_artifacts/polygon_combined_input -name survivorship_universe.csv | head -n 1)
          BARS_ROOT=$(find runtime_artifacts/polygon_combined_input -type d -name historical_bars | head -n 1)
          if [ -z "$UNIVERSE" ]; then
            echo "survivorship_universe.csv not found in combined artifact"
            exit 1
          fi
          if [ -z "$BARS_ROOT" ]; then
            echo "historical_bars directory not found in combined artifact"
            exit 1
          fi
          echo "POLYGON_EDGE_UNIVERSE=$UNIVERSE" >> "$GITHUB_ENV"
          echo "POLYGON_EDGE_BARS_ROOT=$BARS_ROOT" >> "$GITHUB_ENV"
          echo "Using universe: $UNIVERSE"
          echo "Using bars root: $BARS_ROOT"

      - name: Generate historical trade plans
        if: inputs.generate_plans == 'true'
        run: |
          python scripts/generate_historical_trade_plans.py \
            --bars-root "$POLYGON_EDGE_BARS_ROOT" \
            --output "${{ inputs.plans_path }}" \
            --max-plans "${{ inputs.max_generated_plans }}" \
            --max-plans-per-symbol "${{ inputs.max_plans_per_symbol }}" \
            --min-history 60 \
            --lookahead-days "${{ inputs.max_bars_per_plan }}"

      - name: Run edge evidence backtest
        id: edge_backtest
        continue-on-error: true
        run: |
          python scripts/run_edge_evidence_backtest.py \
            --universe "$POLYGON_EDGE_UNIVERSE" \
            --plans "${{ inputs.plans_path }}" \
            --bars-root "$POLYGON_EDGE_BARS_ROOT" \
            --output-dir reports/edge_evidence \
            --as-of "${{ inputs.as_of }}" \
            --minimum-assets "${{ inputs.minimum_assets }}" \
            --oos-split-date "${{ inputs.oos_split_date }}" \
            --max-bars-per-plan "${{ inputs.max_bars_per_plan }}" \
            --survivorship-mode "${{ inputs.survivorship_mode }}"

      - name: Print edge diagnostics snapshot
        if: always()
        run: |
          if [ ! -f reports/edge_evidence/edge-evidence-diagnostics.json ]; then
            echo "Edge diagnostics file not found. Backtest likely stopped before diagnostics were generated."
            exit 0
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("reports/edge_evidence/edge-evidence-diagnostics.json")
          diagnostics = json.loads(path.read_text(encoding="utf-8"))
          historical = diagnostics.get("historical_results", {})
          walk_forward = diagnostics.get("walk_forward", {})
          oos = diagnostics.get("out_of_sample", {})

          print("## Edge Evidence Diagnostics Snapshot")
          print(f"Historical results: {historical.get('total', 0)}")
          print(f"Wins/Losses/Breakeven: {historical.get('wins', 0)}/{historical.get('losses', 0)}/{historical.get('breakeven', 0)}")
          print(f"Win rate: {float(historical.get('win_rate', 0.0)):.2%}")
          print(f"Average R: {float(historical.get('average_r', 0.0)):.4f}")
          print(f"Cumulative R: {float(historical.get('cumulative_r', 0.0)):.4f}")
          print(f"Walk-forward passing cycles: {walk_forward.get('passing_cycles', 0)}/{walk_forward.get('generated_cycles', 0)}")
          print(f"Walk-forward failing cycles: {walk_forward.get('failing_cycles', 0)}")
          print(f"OOS count: {oos.get('out_of_sample_count', 0)}")
          print("Failed OOS gates: " + ", ".join(oos.get("failed_oos_gates", []) or ["-"]))

          failed_checks = oos.get("failed_degradation_checks", [])
          if failed_checks:
            print("Failed degradation checks:")
            for check in failed_checks[:10]:
              print(
                f"- {check.get('metric')}: "
                f"in_sample={check.get('in_sample_value')}, "
                f"oos={check.get('out_of_sample_value')}, "
                f"degradation={float(check.get('degradation', 0.0)):.2%}, "
                f"max={float(check.get('max_allowed_degradation', 0.0)):.2%}"
              )
          else:
            print("Failed degradation checks: -")

          samples = walk_forward.get("failing_cycle_samples", [])
          if samples:
            print("Failing walk-forward cycle samples:")
            for sample in samples[:5]:
              print(
                f"- cycle={sample.get('cycle')}, "
                f"test_records={sample.get('test_records')}, "
                f"expectancy_r={float(sample.get('expectancy_r', 0.0)):.4f}, "
                f"profit_factor={sample.get('profit_factor')}, "
                f"sharpe={float(sample.get('sharpe_ratio', 0.0)):.4f}, "
                f"failed_gates={','.join(sample.get('failed_gates', []) or ['-'])}"
              )
          else:
            print("Failing walk-forward cycle samples: -")
          PY

      - name: Upload generated trade plans
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-historical-trade-plans
          path: ${{ inputs.plans_path }}
          if-no-files-found: warn

      - name: Upload edge evidence reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-evidence-from-polygon-artifact
          path: reports/edge_evidence/
          if-no-files-found: warn

      - name: Fail if edge evidence gates failed
        if: steps.edge_backtest.outcome == 'failure'
        run: |
          echo "Edge evidence gates failed. Reports were uploaded for review."
          exit 1
