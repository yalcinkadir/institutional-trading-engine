name: Outcome Learning Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '15 1 * * *'

jobs:
  update-outcomes:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONPATH: .:./src
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update outcomes and expectancy
        run: |
          python scripts/update_outcomes.py \
            --decision-log data/decision_log.csv \
            --output reports/expectancy-report.md

      - name: Upload expectancy report
        uses: actions/upload-artifact@v4
        with:
          name: expectancy-report
          path: reports/expectancy-report.md
          retention-days: 14
