name: Daily Evidence Report

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date YYYY-MM-DD"
        required: true
        default: "2026-05-25"
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: read

jobs:
  daily-evidence-report:
    name: Build daily evidence report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve report date
        id: report-date
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.report_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare placeholder component reports
        run: |
          mkdir -p reports/daily_evidence_components
          cat > reports/daily_evidence_components/paper_observation_reconciliation.json <<'JSON'
          {"passed": true, "metrics": {"observation_days": 1, "action_mismatch_rate": 0.0, "max_abs_daily_drift_r": 0.0, "unresolved_records": 0}}
          JSON
          cat > reports/daily_evidence_components/performance_drift_detection.json <<'JSON'
          {"passed": true, "metrics": {"forward_expectancy_r": 0.0, "expectancy_drift_r": 0.0, "win_rate_drift": 0.0, "z_score": 0.0}}
          JSON
          cat > reports/daily_evidence_components/sequential_edge_decay.json <<'JSON'
          {"passed": true, "metrics": {"observations": 1, "win_rate": 0.0, "expectancy_r": 0.0, "decision": "continue_observation"}}
          JSON
          cat > reports/daily_evidence_components/regime_change_detection.json <<'JSON'
          {"passed": true, "metrics": {"latest_regime": "unknown", "change_score": 0.0, "state": "stable"}}
          JSON

      - name: Build daily evidence report
        run: |
          python scripts/run_daily_evidence_report.py \
            --input-dir reports/daily_evidence_components \
            --output-dir reports/daily_evidence \
            --report-date "${{ steps.report-date.outputs.value }}" \
            --allow-missing-risk-attribution \
            --allow-missing-monte-carlo

      - name: Upload daily evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-evidence-report-${{ steps.report-date.outputs.value }}
          path: reports/daily_evidence/
